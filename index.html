<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyLLM Research Note</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        html, body, #root { height: 100%; margin: 0; padding: 0; }
        .loading-spinner {
            border: 4px solid #f3f4f6;
            border-top: 4px solid #dc2626;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }
        .status-dot.green { background-color: #22c55e; }
        .status-dot.red { background-color: #ef4444; }
        .status-dot.yellow { background-color: #eab308; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .pdf-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto;
        }
        .pdf-container canvas {
            max-width: 100%;
            height: auto;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div id="root">
        <div style="display:flex; justify-content:center; align-items:center; height:100vh; flex-direction:column; gap:20px; background:#f9fafb;">
            <div class="loading-spinner"></div>
            <p style="color:#6b7280; font-family: system-ui, sans-serif;">Loading MyLLM Research Note...</p>
        </div>
    </div>

    <!-- React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>

    <script>
        const { useState, useEffect, useRef } = React;
        const { createRoot } = ReactDOM;

        // ===== PDF VIEWER COMPONENT =====
        function PDFViewer({ doc, page, onPagesLoaded, scale }) {
            const [isLoading, setIsLoading] = useState(true);
            const [error, setError] = useState(null);
            const canvasRef = useRef(null);
            const renderTaskRef = useRef(null);

            useEffect(() => {
                let isMounted = true;
                
                const renderPDF = async () => {
                    if (!doc || !doc.data) {
                        setIsLoading(false);
                        return;
                    }

                    try {
                        setIsLoading(true);
                        setError(null);

                        // Cancel any previous render
                        if (renderTaskRef.current) {
                            try { renderTaskRef.current.cancel(); } catch(e) {}
                            renderTaskRef.current = null;
                        }

                        // Load the PDF
                        const loadingTask = pdfjsLib.getDocument({ data: doc.data });
                        const pdf = await loadingTask.promise;
                        
                        if (isMounted) {
                            if (onPagesLoaded) onPagesLoaded(pdf.numPages);
                        }

                        // Get the page
                        const pageNum = Math.min(page, pdf.numPages);
                        const pdfPage = await pdf.getPage(pageNum);
                        const viewport = pdfPage.getViewport({ scale: scale || 1.2 });
                        
                        const canvas = canvasRef.current;
                        if (!canvas) {
                            setIsLoading(false);
                            return;
                        }

                        const context = canvas.getContext('2d');
                        canvas.height = viewport.height;
                        canvas.width = viewport.width;

                        // Clear canvas
                        context.clearRect(0, 0, canvas.width, canvas.height);

                        // Render the page
                        const renderTask = pdfPage.render({
                            canvasContext: context,
                            viewport: viewport
                        });
                        renderTaskRef.current = renderTask;

                        await renderTask.promise;

                        if (isMounted) {
                            setIsLoading(false);
                            renderTaskRef.current = null;
                        }
                    } catch (err) {
                        console.error("PDF Render Error:", err);
                        if (isMounted) {
                            setError(err.message);
                            setIsLoading(false);
                        }
                    }
                };

                renderPDF();

                return () => {
                    isMounted = false;
                    if (renderTaskRef.current) {
                        try { renderTaskRef.current.cancel(); } catch(e) {}
                        renderTaskRef.current = null;
                    }
                };
            }, [doc, page, scale, onPagesLoaded]);

            if (error) {
                return React.createElement('div', { className: 'text-red-500 text-center p-4' },
                    'Error loading PDF: ' + error
                );
            }

            return React.createElement('div', { className: 'pdf-container relative' },
                isLoading ? 
                    React.createElement('div', { className: 'absolute inset-0 flex items-center justify-center' },
                        React.createElement('div', { className: 'loading-spinner' })
                    ) : null,
                React.createElement('canvas', {
                    ref: canvasRef,
                    className: 'shadow-2xl bg-white',
                    style: { display: isLoading ? 'none' : 'block' }
                })
            );
        }

        // ===== MAIN APP =====
        function App() {
            // ===== STATE =====
            const [documents, setDocuments] = useState([]);
            const [activeDocId, setActiveDocId] = useState(null);
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [theme, setTheme] = useState('light');
            const [color, setColor] = useState('red');
            const [currentPage, setCurrentPage] = useState(1);
            const [numPages, setNumPages] = useState(0);
            const [pdfScale, setPdfScale] = useState(1.2);
            
            // ===== API KEY STATE =====
            const [apiKey, setApiKey] = useState(() => {
                try { return localStorage.getItem('gemini_api_key') || ''; } catch(e) { return ''; }
            });
            const [apiStatus, setApiStatus] = useState(() => {
                const key = localStorage.getItem('gemini_api_key') || '';
                if (!key) return 'idle';
                if (key.length > 10) return 'valid';
                return 'invalid';
            });
            const [showApiInput, setShowApiInput] = useState(false);
            const [tempApiKey, setTempApiKey] = useState('');

            // ===== API KEY FUNCTIONS =====
            const validateApiKey = (key) => {
                if (!key || key.trim() === '') return 'idle';
                if (key.trim().length > 10) return 'valid';
                return 'invalid';
            };

            const handleApiKeyChange = (e) => {
                const newKey = e.target.value;
                setTempApiKey(newKey);
                setApiStatus(validateApiKey(newKey));
            };

            const handleSaveApiKey = () => {
                if (tempApiKey && tempApiKey.trim().length >= 10) {
                    setApiKey(tempApiKey);
                    localStorage.setItem('gemini_api_key', tempApiKey);
                    setApiStatus('valid');
                    setShowApiInput(false);
                }
            };

            const handleCancelApiKey = () => {
                setTempApiKey(apiKey);
                setShowApiInput(false);
                setApiStatus(validateApiKey(apiKey));
            };

            const handleRemoveApiKey = () => {
                setApiKey('');
                setTempApiKey('');
                localStorage.removeItem('gemini_api_key');
                setApiStatus('idle');
                setShowApiInput(false);
            };

            const getStatusConfig = () => {
                switch(apiStatus) {
                    case 'valid':
                        return { dot: 'green', text: 'Connected', bg: 'bg-green-50 dark:bg-green-900/20', textColor: 'text-green-700 dark:text-green-400' };
                    case 'invalid':
                        return { dot: 'red', text: 'Invalid Key', bg: 'bg-red-50 dark:bg-red-900/20', textColor: 'text-red-700 dark:text-red-400' };
                    default:
                        return { dot: 'yellow', text: 'Not Set', bg: 'bg-yellow-50 dark:bg-yellow-900/20', textColor: 'text-yellow-700 dark:text-yellow-400' };
                }
            };

            const statusConfig = getStatusConfig();

            // ===== OTHER FUNCTIONS =====
            const toggleTheme = () => {
                const newTheme = theme === 'light' ? 'dark' : 'light';
                setTheme(newTheme);
                document.documentElement.classList.toggle('dark');
            };

            const handleUpload = (e) => {
                const files = e.target.files;
                if (!files || files.length === 0) return;
                
                for (const file of files) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const newDoc = { 
                            id: Date.now() + Math.random(), 
                            name: file.name, 
                            data: ev.target.result 
                        };
                        setDocuments(prev => [...prev, newDoc]);
                        if (!activeDocId) {
                            setActiveDocId(newDoc.id);
                            setCurrentPage(1);
                            setNumPages(0);
                        }
                    };
                    reader.readAsDataURL(file);
                }
                e.target.value = '';
            };

            const handleSelectDocument = (docId) => {
                setActiveDocId(docId);
                setCurrentPage(1);
                setNumPages(0);
            };

            const handleDeleteDocument = (docId) => {
                setDocuments(prev => prev.filter(d => d.id !== docId));
                if (activeDocId === docId) {
                    const remaining = documents.filter(d => d.id !== docId);
                    setActiveDocId(remaining.length > 0 ? remaining[0].id : null);
                    setCurrentPage(1);
                    setNumPages(0);
                }
            };

            const goToPreviousPage = () => {
                if (currentPage > 1) setCurrentPage(currentPage - 1);
            };

            const goToNextPage = () => {
                if (numPages && currentPage < numPages) setCurrentPage(currentPage + 1);
            };

            const handleZoomIn = () => {
                setPdfScale(prev => Math.min(prev + 0.2, 3));
            };

            const handleZoomOut = () => {
                setPdfScale(prev => Math.max(prev - 0.2, 0.5));
            };

            const handleResetView = () => {
                setPdfScale(1.2);
            };

            const sendMessage = () => {
                if (!input.trim()) return;
                setMessages([...messages, { role: 'user', text: input }]);
                
                if (apiStatus === 'valid') {
                    setTimeout(() => {
                        setMessages(prev => [...prev, { 
                            role: 'bot', 
                            text: "✅ API Key is valid! This is a demo response. The full Gemini integration is ready." 
                        }]);
                    }, 500);
                } else {
                    setTimeout(() => {
                        setMessages(prev => [...prev, { 
                            role: 'bot', 
                            text: "⚠️ Please set a valid API key to use the Gemini integration. Click 'Set Key' in the header." 
                        }]);
                    }, 500);
                }
                setInput('');
            };

            const getColorClass = (type) => {
                const colors = {
                    red: { bg: 'bg-red-600', hover: 'hover:bg-red-700', text: 'text-red-600' },
                    blue: { bg: 'bg-blue-600', hover: 'hover:bg-blue-700', text: 'text-blue-600' },
                    green: { bg: 'bg-green-600', hover: 'hover:bg-green-700', text: 'text-green-600' },
                    purple: { bg: 'bg-purple-600', hover: 'hover:bg-purple-700', text: 'text-purple-600' },
                    orange: { bg: 'bg-orange-600', hover: 'hover:bg-orange-700', text: 'text-orange-600' }
                };
                const c = colors[color] || colors.red;
                return type === 'bg' ? c.bg : type === 'hover' ? c.hover : c.text;
            };

            const getColorOptions = () => {
                const colors = ['red', 'blue', 'green', 'purple', 'orange'];
                const next = colors[(colors.indexOf(color) + 1) % colors.length];
                return { next, colors };
            };

            const activeDoc = documents.find(d => d.id === activeDocId);

            // ===== BUILD UI =====
            
            // Chat messages
            const chatMessages = messages.map((m, i) => {
                return React.createElement('div', {
                    key: i,
                    className: `p-2 rounded text-sm ${m.role === 'user' ? 'bg-gray-100 dark:bg-gray-700 ml-4' : 'bg-blue-50 dark:bg-blue-900/30 mr-4'}`
                }, m.text);
            });

            // Document list items
            const docItems = documents.map(d => {
                const isActive = activeDocId === d.id;
                return React.createElement('div', { key: d.id, className: 'group relative' },
                    React.createElement('button', {
                        onClick: () => handleSelectDocument(d.id),
                        className: `w-full p-2 text-sm text-left border rounded-lg flex items-center gap-2 mt-1 ${isActive ? `${getColorClass('bg')} text-white` : 'bg-white dark:bg-gray-800 hover:bg-gray-50 dark:hover:bg-gray-700 border-gray-200 dark:border-gray-700'}`
                    }, 
                        React.createElement('span', null, '📄'),
                        React.createElement('span', { className: 'truncate flex-1' }, d.name)
                    ),
                    React.createElement('button', {
                        onClick: () => handleDeleteDocument(d.id),
                        className: 'absolute right-1 top-1/2 -translate-y-1/2 p-1 rounded-full hover:bg-red-100 dark:hover:bg-red-900/30 opacity-0 group-hover:opacity-100 transition-opacity text-red-500'
                    }, '✕')
                );
            });

            // ===== API KEY MANAGER UI =====
            let apiKeyManager;
            
            if (!showApiInput) {
                apiKeyManager = React.createElement('div', { className: 'flex items-center gap-2' },
                    React.createElement('span', { className: 'text-xs text-gray-500 dark:text-gray-400' }, '🔑'),
                    React.createElement('span', { className: `text-xs ${statusConfig.textColor}` }, statusConfig.text),
                    React.createElement('span', { className: `status-dot ${statusConfig.dot}` }),
                    React.createElement('button', {
                        onClick: () => {
                            setShowApiInput(true);
                            setTempApiKey(apiKey);
                        },
                        className: 'text-xs px-2 py-1 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 rounded text-gray-700 dark:text-gray-300'
                    }, apiKey ? 'Change' : 'Set Key'),
                    apiKey ? React.createElement('button', {
                        onClick: handleRemoveApiKey,
                        className: 'text-xs px-2 py-1 text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 rounded'
                    }, '✕') : null
                );
            } else {
                apiKeyManager = React.createElement('div', { className: 'flex items-center gap-2 bg-gray-50 dark:bg-gray-800 p-1 rounded-lg' },
                    React.createElement('input', {
                        type: 'password',
                        placeholder: 'Enter Gemini API key...',
                        className: 'border p-1 text-xs rounded w-48 focus:outline-none focus:ring-2 bg-white dark:bg-gray-700 border-gray-300 dark:border-gray-600 text-gray-900 dark:text-gray-100',
                        value: tempApiKey,
                        onChange: handleApiKeyChange,
                        autoFocus: true,
                        onKeyPress: (e) => e.key === 'Enter' && handleSaveApiKey()
                    }),
                    React.createElement('button', {
                        onClick: handleSaveApiKey,
                        disabled: !tempApiKey || tempApiKey.trim().length < 10,
                        className: `px-2 py-1 rounded text-xs font-semibold ${tempApiKey && tempApiKey.trim().length >= 10 ? 'bg-green-600 hover:bg-green-700 text-white' : 'bg-gray-300 dark:bg-gray-600 cursor-not-allowed text-gray-500 dark:text-gray-400'}`
                    }, 'Save'),
                    React.createElement('button', {
                        onClick: handleCancelApiKey,
                        className: 'px-2 py-1 rounded text-xs bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-300'
                    }, 'Cancel')
                );
            }

            // PDF Viewer
            const pdfViewer = activeDoc ? 
                React.createElement(PDFViewer, {
                    doc: activeDoc,
                    page: currentPage,
                    onPagesLoaded: setNumPages,
                    scale: pdfScale
                }) :
                React.createElement('div', { className: 'text-center text-gray-400 dark:text-gray-500' },
                    React.createElement('div', { className: 'text-6xl mb-4' }, '📄'),
                    React.createElement('p', null, 'No document loaded'),
                    React.createElement('p', { className: 'text-xs mt-1' }, 'Upload a PDF to get started')
                );

            // Main app UI
            return React.createElement('div', {
                className: `min-h-screen flex flex-col ${theme === 'dark' ? 'bg-gray-900 text-gray-100' : 'bg-gray-50 text-gray-900'}`
            },
                // Header
                React.createElement('header', {
                    className: `border-b p-3 flex justify-between items-center ${theme === 'dark' ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'}`
                },
                    React.createElement('h1', { className: `font-serif text-xl font-bold ${getColorClass('text')}` }, 'MyLLM Research Note'),
                    React.createElement('div', { className: 'flex items-center gap-3 flex-wrap' },
                        apiKeyManager,
                        React.createElement('button', {
                            onClick: toggleTheme,
                            className: 'p-2 rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 border border-gray-200 dark:border-gray-600'
                        }, theme === 'light' ? '🌙' : '☀️'),
                        React.createElement('button', {
                            onClick: () => {
                                const { next } = getColorOptions();
                                setColor(next);
                            },
                            className: 'p-2 rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 border border-gray-200 dark:border-gray-600'
                        }, '🎨')
                    )
                ),

                // Main Content
                React.createElement('div', { className: 'flex flex-1 overflow-hidden' },
                    // Left Sidebar
                    React.createElement('aside', {
                        className: `w-64 border-r ${theme === 'dark' ? 'bg-gray-900 border-gray-700' : 'bg-gray-50 border-gray-200'} flex flex-col`
                    },
                        // Upload button
                        React.createElement('div', { className: 'p-3 border-b dark:border-gray-700 bg-white dark:bg-gray-800' },
                            React.createElement('button', {
                                onClick: () => document.getElementById('fileInput').click(),
                                className: `w-full py-2 px-3 text-white rounded-lg flex items-center justify-center gap-2 ${getColorClass('bg')} ${getColorClass('hover')}`
                            },
                                React.createElement('span', null, '📄'),
                                React.createElement('span', { className: 'text-sm font-semibold' }, 'Upload Document'),
                                React.createElement('input', { 
                                    id: 'fileInput', 
                                    type: 'file', 
                                    className: 'hidden', 
                                    accept: '.pdf', 
                                    onChange: handleUpload,
                                    multiple: true
                                })
                            ),
                            React.createElement('p', { className: 'text-[10px] text-gray-400 dark:text-gray-500 text-center mt-1' }, 'Upload one or multiple PDFs')
                        ),
                        // Library
                        React.createElement('div', { className: 'flex-1 overflow-y-auto p-3' },
                            React.createElement('div', { className: 'flex items-center gap-2 mb-2' },
                                React.createElement('span', { className: 'text-xs font-semibold text-gray-500 dark:text-gray-400' }, `📚 Library (${documents.length})`)
                            ),
                            documents.length === 0 ? 
                                React.createElement('div', { className: 'text-gray-400 dark:text-gray-500 text-sm text-center mt-8' },
                                    React.createElement('div', { className: 'text-4xl mb-2' }, '📄'),
                                    React.createElement('p', null, 'No documents'),
                                    React.createElement('p', { className: 'text-xs mt-1' }, 'Upload a PDF to get started')
                                ) :
                                React.createElement('div', null, docItems)
                        )
                    ),

                    // Center - PDF Viewer
                    React.createElement('main', {
                        className: `flex-1 flex flex-col ${theme === 'dark' ? 'bg-gray-800' : 'bg-gray-200'}`
                    },
                        // Toolbar
                        React.createElement('div', {
                            className: `p-2 border-b ${theme === 'dark' ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'} flex justify-between items-center`
                        },
                            React.createElement('span', { className: 'text-xs font-semibold text-gray-500 dark:text-gray-400' },
                                activeDoc ? activeDoc.name : 'Document Viewer'
                            ),
                            activeDoc ? 
                                React.createElement('div', { className: 'flex items-center gap-2 flex-wrap' },
                                    React.createElement('button', {
                                        onClick: handleZoomIn,
                                        className: 'p-1 rounded bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-300'
                                    }, '➕'),
                                    React.createElement('button', {
                                        onClick: handleZoomOut,
                                        className: 'p-1 rounded bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-300'
                                    }, '➖'),
                                    React.createElement('button', {
                                        onClick: handleResetView,
                                        className: 'p-1 rounded bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 text-xs px-2 text-gray-700 dark:text-gray-300'
                                    }, 'Reset'),
                                    React.createElement('span', { className: 'text-xs w-10 text-gray-700 dark:text-gray-300' }, (pdfScale * 100).toFixed(0) + '%'),
                                    React.createElement('button', {
                                        onClick: goToPreviousPage,
                                        disabled: currentPage <= 1,
                                        className: `p-1 rounded ${currentPage <= 1 ? 'opacity-50 cursor-not-allowed' : 'bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600'} text-gray-700 dark:text-gray-300`
                                    }, '◀'),
                                    React.createElement('span', { className: 'text-xs text-gray-700 dark:text-gray-300' }, currentPage + ' / ' + (numPages || '?')),
                                    React.createElement('button', {
                                        onClick: goToNextPage,
                                        disabled: !numPages || currentPage >= numPages,
                                        className: `p-1 rounded ${!numPages || currentPage >= numPages ? 'opacity-50 cursor-not-allowed' : 'bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600'} text-gray-700 dark:text-gray-300`
                                    }, '▶')
                                ) : null
                        ),

                        // Action Buttons
                        activeDoc ? 
                            React.createElement('div', {
                                className: `p-2 border-b ${theme === 'dark' ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'} flex items-center gap-2`
                            },
                                React.createElement('button', {
                                    className: 'px-4 py-1.5 rounded text-white text-sm font-semibold bg-purple-600 hover:bg-purple-700'
                                }, '🎯 Create Presentation'),
                                React.createElement('button', {
                                    className: `px-4 py-1.5 rounded text-white text-sm font-semibold ${getColorClass('bg')} ${getColorClass('hover')}`
                                }, '🌳 Create Mindmap')
                            ) : null,

                        // PDF Viewer Content
                        React.createElement('div', { className: 'flex-1 overflow-auto p-4 flex items-center justify-center' },
                            pdfViewer
                        )
                    ),

                    // Right Sidebar - Chat
                    React.createElement('aside', {
                        className: `w-80 border-l ${theme === 'dark' ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'} flex flex-col`
                    },
                        React.createElement('div', {
                            className: `text-xs font-semibold text-gray-500 dark:text-gray-400 p-2 border-b ${theme === 'dark' ? 'border-gray-700' : 'border-gray-200'} flex justify-between items-center`
                        },
                            React.createElement('span', null, '💬 Research Assistant'),
                            apiStatus === 'valid' ? 
                                React.createElement('span', { className: 'text-xs text-green-600 dark:text-green-400' }, '✅ Online') :
                                React.createElement('span', { className: 'text-xs text-yellow-600 dark:text-yellow-400' }, '⚠️ API Key Required')
                        ),
                        React.createElement('div', { className: 'flex-1 overflow-y-auto p-2 space-y-2' },
                            messages.length === 0 ? 
                                React.createElement('div', { className: 'text-gray-400 dark:text-gray-500 text-sm text-center mt-4' },
                                    '💬 Ask me anything about your documents!'
                                ) :
                                chatMessages
                        ),
                        React.createElement('div', { className: 'p-2 border-t dark:border-gray-700' },
                            React.createElement('div', { className: 'flex gap-2' },
                                React.createElement('input', {
                                    value: input,
                                    onChange: (e) => setInput(e.target.value),
                                    className: `flex-1 border p-2 rounded text-sm bg-white dark:bg-gray-700 border-gray-300 dark:border-gray-600 text-gray-900 dark:text-gray-100 ${apiStatus !== 'valid' ? 'cursor-not-allowed opacity-60' : ''}`,
                                    placeholder: apiStatus === 'valid' ? 'Ask anything...' : 'Set API key first...',
                                    onKeyPress: (e) => e.key === 'Enter' && sendMessage(),
                                    disabled: apiStatus !== 'valid'
                                }),
                                React.createElement('button', {
                                    onClick: sendMessage,
                                    disabled: apiStatus !== 'valid',
                                    className: `p-2 rounded text-white ${apiStatus === 'valid' ? `${getColorClass('bg')} ${getColorClass('hover')}` : 'bg-gray-400 dark:bg-gray-600 cursor-not-allowed'}`
                                }, '➤')
                            ),
                            apiStatus !== 'valid' ? 
                                React.createElement('p', { className: 'text-xs text-yellow-600 dark:text-yellow-500 mt-1' },
                                    '⚠️ Please set a valid API key in the header'
                                ) : null
                        )
                    )
                )
            );
        }

        // Render
        const root = createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
