<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyLLM Research Note</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <style>
        html, body, #root { height: 100%; margin: 0; padding: 0; }
        .loading-spinner {
            border: 4px solid #f3f4f6;
            border-top: 4px solid #dc2626;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="root">
        <div style="display:flex; justify-content:center; align-items:center; height:100vh; flex-direction:column; gap:20px; background:#f9fafb;">
            <div class="loading-spinner"></div>
            <p style="color:#6b7280; font-family: system-ui, sans-serif;">Loading MyLLM Research Note...</p>
        </div>
    </div>

    <!-- React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- ===== SIMPLE APP ===== -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Simple App Component
        function App() {
            const [documents, setDocuments] = useState([]);
            const [activeDoc, setActiveDoc] = useState(null);
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [theme, setTheme] = useState('light');
            const [color, setColor] = useState('red');

            // Toggle theme
            const toggleTheme = () => {
                const newTheme = theme === 'light' ? 'dark' : 'light';
                setTheme(newTheme);
                document.documentElement.classList.toggle('dark');
            };

            // Handle file upload
            const handleUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const newDoc = {
                        id: Date.now(),
                        name: file.name,
                        data: ev.target.result
                    };
                    setDocuments([...documents, newDoc]);
                    setActiveDoc(newDoc);
                };
                reader.readAsDataURL(file);
                e.target.value = '';
            };

            // Handle chat send
            const sendMessage = () => {
                if (!input.trim()) return;
                setMessages([...messages, { role: 'user', text: input }]);
                setTimeout(() => {
                    setMessages(prev => [...prev, { 
                        role: 'bot', 
                        text: "This is a demo response. Your Gemini API key is not configured yet." 
                    }]);
                }, 500);
                setInput('');
            };

            const colorClasses = {
                red: 'bg-red-600 hover:bg-red-700 text-red-600',
                blue: 'bg-blue-600 hover:bg-blue-700 text-blue-600',
                green: 'bg-green-600 hover:bg-green-700 text-green-600',
                purple: 'bg-purple-600 hover:bg-purple-700 text-purple-600',
                orange: 'bg-orange-600 hover:bg-orange-700 text-orange-600'
            };

            const getColorClass = (type) => {
                const c = colorClasses[color] || colorClasses.red;
                return type === 'bg' ? c.split(' ')[0] : c.split(' ')[2];
            };

            return (
                <div className={`min-h-screen flex flex-col ${theme === 'dark' ? 'bg-gray-900 text-gray-100' : 'bg-gray-50 text-gray-900'}`}>
                    {/* Header */}
                    <header className={`border-b p-3 flex justify-between items-center ${theme === 'dark' ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'}`}>
                        <h1 className={`font-serif text-xl font-bold ${getColorClass('text')}`}>MyLLM Research Note</h1>
                        <div className="flex items-center gap-3">
                            <button 
                                onClick={toggleTheme}
                                className="p-2 rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 border border-gray-200 dark:border-gray-600"
                            >
                                {theme === 'light' ? '🌙' : '☀️'}
                            </button>
                            <button 
                                onClick={() => {
                                    const colors = ['red', 'blue', 'green', 'purple', 'orange'];
                                    const next = colors[(colors.indexOf(color) + 1) % colors.length];
                                    setColor(next);
                                }}
                                className="p-2 rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 border border-gray-200 dark:border-gray-600"
                            >
                                🎨
                            </button>
                            <span className="text-xs text-gray-500 dark:text-gray-400">API Key: Not Set</span>
                        </div>
                    </header>

                    {/* Main Content */}
                    <div className="flex flex-1 overflow-hidden">
                        {/* Left Sidebar */}
                        <aside className={`w-64 border-r ${theme === 'dark' ? 'bg-gray-900 border-gray-700' : 'bg-gray-50 border-gray-200'} flex flex-col`}>
                            <div className="p-3 border-b dark:border-gray-700 bg-white dark:bg-gray-800">
                                <button 
                                    onClick={() => document.getElementById('fileInput').click()}
                                    className={`w-full py-2 px-3 text-white rounded-lg flex items-center justify-center gap-2 ${getColorClass('bg')}`}
                                >
                                    <span>📄</span>
                                    <span className="text-sm font-semibold">Upload Document</span>
                                    <input id="fileInput" type="file" className="hidden" accept=".pdf" onChange={handleUpload} />
                                </button>
                            </div>
                            <div className="flex-1 overflow-y-auto p-3">
                                <div className="text-xs font-semibold text-gray-500 dark:text-gray-400 mb-2">Library ({documents.length})</div>
                                {documents.length === 0 && (
                                    <div className="text-gray-400 dark:text-gray-500 text-sm text-center mt-8">
                                        <div className="text-4xl mb-2">📄</div>
                                        <p>No documents</p>
                                        <p className="text-xs mt-1">Upload a PDF to get started</p>
                                    </div>
                                )}
                                {documents.map(d => (
                                    <button 
                                        key={d.id}
                                        onClick={() => setActiveDoc(d)}
                                        className={`w-full p-2 text-sm text-left border rounded-lg flex items-center gap-2 mt-1 ${activeDoc?.id === d.id ? `${getColorClass('bg')} text-white` : 'bg-white dark:bg-gray-800 hover:bg-gray-50 dark:hover:bg-gray-700 border-gray-200 dark:border-gray-700'}`}
                                    >
                                        <span>📄</span>
                                        <span className="truncate">{d.name}</span>
                                    </button>
                                ))}
                            </div>
                        </aside>

                        {/* Center - PDF Viewer */}
                        <main className={`flex-1 flex flex-col ${theme === 'dark' ? 'bg-gray-800' : 'bg-gray-200'}`}>
                            <div className={`p-2 border-b ${theme === 'dark' ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'} flex justify-between items-center`}>
                                <span className="text-xs font-semibold text-gray-500 dark:text-gray-400">
                                    {activeDoc ? activeDoc.name : 'Document Viewer'}
                                </span>
                                {activeDoc && (
                                    <div className="flex items-center gap-2">
                                        <span className="text-xs">Page 1 / 1</span>
                                    </div>
                                )}
                            </div>

                            {/* Action Buttons */}
                            {activeDoc && (
                                <div className={`p-2 border-b ${theme === 'dark' ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'} flex items-center gap-2`}>
                                    <button className="px-4 py-1.5 rounded text-white text-sm font-semibold bg-purple-600 hover:bg-purple-700">
                                        🎯 Create Presentation
                                    </button>
                                    <button className={`px-4 py-1.5 rounded text-white text-sm font-semibold ${getColorClass('bg')}`}>
                                        🌳 Create Mindmap
                                    </button>
                                </div>
                            )}

                            {/* Viewer Content */}
                            <div className="flex-1 overflow-auto p-4 flex items-center justify-center">
                                {activeDoc ? (
                                    <div className="bg-white dark:bg-gray-700 rounded-lg shadow-xl p-8 text-center">
                                        <div className="text-6xl mb-4">📄</div>
                                        <p className="text-gray-600 dark:text-gray-300">{activeDoc.name}</p>
                                        <p className="text-sm text-gray-400 dark:text-gray-500 mt-2">PDF loaded successfully!</p>
                                        <p className="text-xs text-gray-400 dark:text-gray-500 mt-1">(PDF rendering requires additional setup)</p>
                                    </div>
                                ) : (
                                    <div className="text-center text-gray-400 dark:text-gray-500">
                                        <div className="text-6xl mb-4">📄</div>
                                        <p>No document loaded</p>
                                        <p className="text-xs mt-1">Upload a PDF to get started</p>
                                    </div>
                                )}
                            </div>
                        </main>

                        {/* Right Sidebar - Chat */}
                        <aside className={`w-80 border-l ${theme === 'dark' ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'} flex flex-col`}>
                            <div className={`text-xs font-semibold text-gray-500 dark:text-gray-400 p-2 border-b ${theme === 'dark' ? 'border-gray-700' : 'border-gray-200'}`}>
                                💬 Research Assistant
                            </div>
                            <div className="flex-1 overflow-y-auto p-2 space-y-2">
                                {messages.length === 0 && (
                                    <div className="text-gray-400 dark:text-gray-500 text-sm text-center mt-4">
                                        Ask me anything about your documents!
                                    </div>
                                )}
                                {messages.map((m, i) => (
                                    <div key={i} className={`p-2 rounded text-sm ${m.role === 'user' ? 'bg-gray-100 dark:bg-gray-700 ml-4' : 'bg-blue-50 dark:bg-blue-900/30 mr-4'}`}>
                                        {m.text}
                                    </div>
                                ))}
                            </div>
                            <div className="p-2 border-t dark:border-gray-700">
                                <div className="flex gap-2">
                                    <input 
                                        value={input} 
                                        onChange={(e) => setInput(e.target.value)} 
                                        className="flex-1 border p-2 rounded text-sm bg-white dark:bg-gray-700 border-gray-300 dark:border-gray-600 text-gray-900 dark:text-gray-100"
                                        placeholder="Ask anything..."
                                        onKeyPress={(e) => e.key === 'Enter' && sendMessage()}
                                    />
                                    <button 
                                        onClick={sendMessage} 
                                        className={`p-2 rounded text-white ${getColorClass('bg')}`}
                                    >
                                        ➤
                                    </button>
                                </div>
                            </div>
                        </aside>
                    </div>
                </div>
            );
        }

        // Render
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
