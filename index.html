<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyLLM Research Note</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        html, body, #root { height: 100%; margin: 0; padding: 0; }
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 4px;
        }
        .status-dot.green { background-color: #22c55e; }
        .status-dot.red { background-color: #ef4444; }
        .status-dot.yellow { background-color: #eab308; }
        .pdf-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            background: #f3f4f6;
        }
        .pdf-container iframe {
            width: 100%;
            height: 100%;
            min-height: 500px;
            border: none;
            border-radius: 8px;
            background: white;
        }
        .pdf-placeholder {
            text-align: center;
            padding: 60px 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <script>
        const { useState, useEffect, useRef } = React;
        const { createRoot } = ReactDOM;

        function App() {
            const [documents, setDocuments] = useState([]);
            const [activeDocId, setActiveDocId] = useState(null);
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [theme, setTheme] = useState('light');
            const [color, setColor] = useState('red');
            
            // API Key State
            const [apiKey, setApiKey] = useState(() => {
                try { return localStorage.getItem('gemini_api_key') || ''; } catch(e) { return ''; }
            });
            const [apiStatus, setApiStatus] = useState('idle');
            const [showApiInput, setShowApiInput] = useState(false);
            const [tempApiKey, setTempApiKey] = useState('');
            const [isValidating, setIsValidating] = useState(false);

            // Validate API Key
            const validateApiKey = async (key) => {
                if (!key || key.trim() === '') {
                    setApiStatus('idle');
                    return false;
                }
                
                setIsValidating(true);
                try {
                    const response = await fetch(
                        `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${key}`,
                        {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: "Hello" }] }],
                                generationConfig: { maxOutputTokens: 5 }
                            })
                        }
                    );
                    
                    if (response.ok) {
                        setApiStatus('valid');
                        return true;
                    } else {
                        const errorData = await response.json();
                        console.error('API Error:', errorData);
                        setApiStatus('invalid');
                        return false;
                    }
                } catch (err) {
                    console.error('Validation error:', err);
                    setApiStatus('invalid');
                    return false;
                } finally {
                    setIsValidating(false);
                }
            };

            // API Key Functions
            const handleApiKeyChange = (e) => {
                const newKey = e.target.value;
                setTempApiKey(newKey);
                if (!newKey || newKey.trim() === '') {
                    setApiStatus('idle');
                } else {
                    setApiStatus('checking');
                }
            };

            const handleSaveApiKey = async () => {
                if (!tempApiKey || tempApiKey.trim().length < 10) {
                    alert('Please enter a valid API key (minimum 10 characters)');
                    return;
                }
                
                const isValid = await validateApiKey(tempApiKey);
                if (isValid) {
                    setApiKey(tempApiKey);
                    localStorage.setItem('gemini_api_key', tempApiKey);
                    setShowApiInput(false);
                    alert('✅ API key validated successfully!');
                } else {
                    alert('❌ Invalid API key. Please check your Gemini API key and try again.');
                }
            };

            const handleCancelApiKey = () => {
                setTempApiKey(apiKey);
                setShowApiInput(false);
                if (apiKey) {
                    validateApiKey(apiKey);
                } else {
                    setApiStatus('idle');
                }
            };

            const handleRemoveApiKey = () => {
                setApiKey('');
                setTempApiKey('');
                localStorage.removeItem('gemini_api_key');
                setApiStatus('idle');
                setShowApiInput(false);
            };

            // Validate on load
            useEffect(() => {
                if (apiKey) {
                    validateApiKey(apiKey);
                }
            }, []);

            const getStatusConfig = () => {
                switch (apiStatus) {
                    case 'valid': return { dot: 'green', text: 'Connected' };
                    case 'invalid': return { dot: 'red', text: 'Invalid Key' };
                    case 'checking': return { dot: 'yellow', text: 'Checking...' };
                    default: return { dot: 'yellow', text: 'Not Set' };
                }
            };
            const statusConfig = getStatusConfig();

            // Theme Functions
            const toggleTheme = () => {
                const newTheme = theme === 'light' ? 'dark' : 'light';
                setTheme(newTheme);
                document.documentElement.classList.toggle('dark');
            };

            const getColorClass = (type) => {
                const colors = {
                    red: { bg: 'bg-red-600', hover: 'hover:bg-red-700', text: 'text-red-600' },
                    blue: { bg: 'bg-blue-600', hover: 'hover:bg-blue-700', text: 'text-blue-600' },
                    green: { bg: 'bg-green-600', hover: 'hover:bg-green-700', text: 'text-green-600' },
                    purple: { bg: 'bg-purple-600', hover: 'hover:bg-purple-700', text: 'text-purple-600' },
                    orange: { bg: 'bg-orange-600', hover: 'hover:bg-orange-700', text: 'text-orange-600' }
                };
                const c = colors[color] || colors.red;
                return type === 'bg' ? c.bg : type === 'hover' ? c.hover : c.text;
            };

            // Document Functions
            const handleUpload = (e) => {
                const files = e.target.files;
                if (!files || files.length === 0) return;
                for (const file of files) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const newDoc = {
                            id: Date.now() + Math.random() * 1000,
                            name: file.name,
                            data: ev.target.result
                        };
                        setDocuments(prev => [...prev, newDoc]);
                        if (!activeDocId) {
                            setActiveDocId(newDoc.id);
                        }
                    };
                    reader.readAsDataURL(file);
                }
                e.target.value = '';
            };

            const handleDelete = (docId) => {
                setDocuments(prev => prev.filter(d => d.id !== docId));
                if (activeDocId === docId) {
                    const remaining = documents.filter(d => d.id !== docId);
                    setActiveDocId(remaining.length > 0 ? remaining[0].id : null);
                }
            };

            const activeDoc = documents.find(d => d.id === activeDocId);

            // PDF Viewer using iframe
            function PDFViewer({ doc }) {
                if (!doc || !doc.data) {
                    return React.createElement('div', { className: 'pdf-container' },
                        React.createElement('div', { className: 'pdf-placeholder' },
                            React.createElement('div', { className: 'text-6xl mb-4' }, '📄'),
                            React.createElement('p', { className: 'text-gray-500 dark:text-gray-400' }, 'No document loaded'),
                            React.createElement('p', { className: 'text-sm text-gray-400 dark:text-gray-500 mt-2' }, 'Upload a PDF to view it here')
                        )
                    );
                }

                return React.createElement('div', { className: 'pdf-container' },
                    React.createElement('iframe', {
                        src: doc.data,
                        title: doc.name,
                        style: { width: '100%', height: '100%', minHeight: '500px', border: 'none', borderRadius: '8px', background: 'white' }
                    })
                );
            }

            // Chat Functions
            const sendMessage = () => {
                if (!input.trim()) return;

                const userMsg = { role: 'user', text: input };
                setMessages(prev => [...prev, userMsg]);
                const currentInput = input;
                setInput('');

                setTimeout(() => {
                    if (apiStatus === 'valid') {
                        setMessages(prev => [...prev, {
                            role: 'bot',
                            text: `🤖 You asked: "${currentInput}"\n\nYour API key is valid! Ready for Gemini integration.`
                        }]);
                    } else {
                        setMessages(prev => [...prev, {
                            role: 'bot',
                            text: `⚠️ Please set a valid API key in the header to use the Gemini integration.`
                        }]);
                    }
                }, 500);
            };

            // Mindmap
            const [mindmapData, setMindmapData] = useState(null);
            const [showMindmap, setShowMindmap] = useState(false);
            const [showPresentation, setShowPresentation] = useState(false);

            const generateMindmap = () => {
                if (!activeDoc) {
                    alert('Please upload a document first');
                    return;
                }
                setMindmapData([
                    { id: 'root', label: activeDoc.name.replace('.pdf', '').substring(0, 30), parent: null, color: '#dc2626' },
                    { id: '1', label: 'Key Concept 1', parent: 'root', color: '#4CAF50' },
                    { id: '2', label: 'Key Concept 2', parent: 'root', color: '#2196F3' },
                    { id: '3', label: 'Key Concept 3', parent: 'root', color: '#FF9800' },
                    { id: '1-1', label: 'Sub-concept A', parent: '1', color: '#8BC34A' },
                    { id: '1-2', label: 'Sub-concept B', parent: '1', color: '#8BC34A' },
                    { id: '2-1', label: 'Sub-concept C', parent: '2', color: '#64B5F6' },
                    { id: '3-1', label: 'Sub-concept D', parent: '3', color: '#FFB74D' },
                ]);
                setShowMindmap(true);
            };

            const generatePresentation = () => {
                if (!activeDoc) {
                    alert('Please upload a document first');
                    return;
                }
                alert(`✅ Presentation generated for: ${activeDoc.name}`);
                setShowPresentation(false);
            };

            // ===== BUILD UI =====

            // API Key Manager
            let apiKeyManager;
            if (!showApiInput) {
                apiKeyManager = React.createElement('div', { className: 'flex items-center gap-2' },
                    React.createElement('span', { className: 'text-xs text-gray-500 dark:text-gray-400' }, '🔑'),
                    React.createElement('span', { className: `status-dot ${statusConfig.dot}` }),
                    React.createElement('span', { className: `text-xs ${apiStatus === 'valid' ? 'text-green-700 dark:text-green-400' : apiStatus === 'invalid' ? 'text-red-700 dark:text-red-400' : 'text-yellow-700 dark:text-yellow-400'}` }, statusConfig.text),
                    React.createElement('button', {
                        onClick: () => { setShowApiInput(true);
                            setTempApiKey(apiKey); },
                        className: 'text-xs px-2 py-1 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 rounded'
                    }, apiKey ? 'Change' : 'Set Key'),
                    apiKey ? React.createElement('button', {
                        onClick: handleRemoveApiKey,
                        className: 'text-xs px-2 py-1 text-red-600 hover:bg-red-50 rounded'
                    }, '✕') : null
                );
            } else {
                apiKeyManager = React.createElement('div', { className: 'flex items-center gap-2 bg-gray-50 dark:bg-gray-800 p-1 rounded-lg' },
                    React.createElement('input', {
                        type: 'password',
                        placeholder: 'Enter Gemini API key...',
                        className: 'border p-1 text-xs rounded w-48 focus:outline-none focus:ring-2 bg-white dark:bg-gray-700',
                        value: tempApiKey,
                        onChange: handleApiKeyChange,
                        autoFocus: true,
                        onKeyPress: (e) => e.key === 'Enter' && handleSaveApiKey()
                    }),
                    React.createElement('button', {
                        onClick: handleSaveApiKey,
                        disabled: isValidating || !tempApiKey || tempApiKey.trim().length < 10,
                        className: `px-2 py-1 rounded text-xs font-semibold ${!isValidating && tempApiKey && tempApiKey.trim().length >= 10 ? 'bg-green-600 hover:bg-green-700 text-white' : 'bg-gray-300 dark:bg-gray-600 cursor-not-allowed text-gray-500'}`
                    }, isValidating ? 'Checking...' : 'Save'),
                    React.createElement('button', {
                        onClick: handleCancelApiKey,
                        className: 'px-2 py-1 rounded text-xs bg-gray-200 dark:bg-gray-700 hover:bg-gray-300'
                    }, 'Cancel')
                );
            }

            // Document list
            const docItems = documents.map(d => {
                const isActive = activeDocId === d.id;
                return React.createElement('div', { key: d.id, className: 'group relative' },
                    React.createElement('button', {
                        onClick: () => { setActiveDocId(d.id);
                            setShowMindmap(false);
                            setShowPresentation(false); },
                        className: `w-full p-2 text-sm text-left border rounded-lg flex items-center gap-2 mt-1 ${isActive ? getColorClass('bg') + ' text-white' : 'bg-white dark:bg-gray-800 hover:bg-gray-50 dark:hover:bg-gray-700 border-gray-200 dark:border-gray-700'}`
                    },
                        React.createElement('span', null, '📄'),
                        React.createElement('span', { className: 'truncate flex-1' }, d.name)
                    ),
                    React.createElement('button', {
                        onClick: () => handleDelete(d.id),
                        className: 'absolute right-1 top-1/2 -translate-y-1/2 p-1 rounded-full hover:bg-red-100 opacity-0 group-hover:opacity-100 transition-opacity text-red-500'
                    }, '✕')
                );
            });

            // Chat messages
            const chatMessages = messages.map((m, i) => {
                return React.createElement('div', {
                    key: i,
                    className: `p-2 rounded text-sm ${m.role === 'user' ? 'bg-gray-100 dark:bg-gray-700 ml-4' : 'bg-blue-50 dark:bg-blue-900/30 mr-4'}`
                }, m.text);
            });

            // Main App
            return React.createElement('div', {
                className: `min-h-screen flex flex-col ${theme === 'dark' ? 'bg-gray-900 text-gray-100' : 'bg-gray-50 text-gray-900'}`
            },
                // Header
                React.createElement('header', {
                    className: `border-b p-3 flex justify-between items-center ${theme === 'dark' ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'}`
                },
                    React.createElement('h1', { className: `font-serif text-xl font-bold ${getColorClass('text')}` }, 'MyLLM Research Note'),
                    React.createElement('div', { className: 'flex items-center gap-3' },
                        apiKeyManager,
                        React.createElement('button', {
                            onClick: toggleTheme,
                            className: 'p-2 rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 border border-gray-200'
                        }, theme === 'light' ? '🌙' : '☀️'),
                        React.createElement('button', {
                            onClick: () => {
                                const colors = ['red', 'blue', 'green', 'purple', 'orange'];
                                const next = colors[(colors.indexOf(color) + 1) % colors.length];
                                setColor(next);
                            },
                            className: 'p-2 rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 border border-gray-200'
                        }, '🎨')
                    )
                ),

                // Main Content
                React.createElement('div', { className: 'flex flex-1 overflow-hidden' },
                    // Left Sidebar
                    React.createElement('aside', {
                        className: `w-64 border-r ${theme === 'dark' ? 'bg-gray-900 border-gray-700' : 'bg-gray-50 border-gray-200'} flex flex-col`
                    },
                        React.createElement('div', { className: 'p-3 border-b dark:border-gray-700 bg-white dark:bg-gray-800' },
                            React.createElement('button', {
                                onClick: () => document.getElementById('fileInput').click(),
                                className: `w-full py-2 px-3 text-white rounded-lg flex items-center justify-center gap-2 ${getColorClass('bg')} ${getColorClass('hover')}`
                            },
                                React.createElement('span', null, '📄'),
                                React.createElement('span', { className: 'text-sm font-semibold' }, 'Upload Document'),
                                React.createElement('input', {
                                    id: 'fileInput',
                                    type: 'file',
                                    className: 'hidden',
                                    accept: '.pdf',
                                    onChange: handleUpload,
                                    multiple: true
                                })
                            ),
                            React.createElement('p', { className: 'text-[10px] text-gray-400 dark:text-gray-500 text-center mt-1' }, 'Upload one or multiple PDFs')
                        ),
                        React.createElement('div', { className: 'flex-1 overflow-y-auto p-3' },
                            React.createElement('div', { className: 'flex items-center gap-2 mb-2' },
                                React.createElement('span', { className: 'text-xs font-semibold uppercase tracking-wider text-gray-500 dark:text-gray-400' }, '📚 Library (' + documents.length + ')')
                            ),
                            documents.length === 0 ?
                            React.createElement('div', { className: 'text-gray-400 dark:text-gray-500 text-sm text-center mt-8' },
                                React.createElement('div', { className: 'text-4xl mb-2' }, '📄'),
                                React.createElement('p', null, 'No documents'),
                                React.createElement('p', { className: 'text-xs mt-1' }, 'Upload a PDF to get started')
                            ) :
                            React.createElement('div', null, docItems)
                        )
                    ),

                    // Center - PDF Viewer
                    React.createElement('main', {
                        className: `flex-1 flex flex-col ${theme === 'dark' ? 'bg-gray-800' : 'bg-gray-200'}`
                    },
                        React.createElement('div', {
                            className: `p-2 border-b ${theme === 'dark' ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'} flex justify-between items-center`
                        },
                            React.createElement('span', { className: 'text-xs font-semibold text-gray-500 dark:text-gray-400' },
                                activeDoc ? activeDoc.name : 'Document Viewer'
                            )
                        ),

                        activeDoc ?
                        React.createElement('div', {
                            className: `p-2 border-b ${theme === 'dark' ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'} flex items-center gap-2`
                        },
                            React.createElement('button', {
                                onClick: () => setShowPresentation(true),
                                className: 'px-4 py-1.5 rounded text-white text-sm font-semibold bg-purple-600 hover:bg-purple-700'
                            }, '🎯 Create Presentation'),
                            React.createElement('button', {
                                onClick: generateMindmap,
                                className: `px-4 py-1.5 rounded text-white text-sm font-semibold ${getColorClass('bg')} ${getColorClass('hover')}`
                            }, '🌳 Create Mindmap')
                        ) :
                        null,

                        React.createElement('div', { className: 'flex-1 overflow-auto' },
                            showPresentation && activeDoc ?
                            React.createElement('div', { className: 'w-full h-full bg-white dark:bg-gray-800 rounded-lg shadow-xl p-8 flex flex-col items-center justify-center' },
                                React.createElement('h2', { className: 'text-2xl font-bold' }, '🎯 Create Presentation'),
                                React.createElement('p', { className: 'text-gray-500 dark:text-gray-400 mt-2' }, 'Generate slides from your document'),
                                React.createElement('button', {
                                    onClick: generatePresentation,
                                    className: `mt-4 px-6 py-2 rounded text-white ${getColorClass('bg')} ${getColorClass('hover')}`
                                }, 'Generate Slides'),
                                React.createElement('button', {
                                    onClick: () => setShowPresentation(false),
                                    className: 'mt-2 px-6 py-2 bg-gray-200 dark:bg-gray-700 rounded'
                                }, 'Close')
                            ) :
                            showMindmap && mindmapData ?
                            React.createElement('div', { className: 'w-full h-full bg-white dark:bg-gray-800 rounded-lg shadow-xl overflow-hidden flex flex-col' },
                                React.createElement('div', { className: 'flex justify-between items-center p-3 border-b bg-gray-50 dark:bg-gray-700' },
                                    React.createElement('h3', { className: 'font-bold text-lg' }, '🌳 Mindmap'),
                                    React.createElement('button', {
                                        onClick: () => setShowMindmap(false),
                                        className: 'text-gray-500 hover:text-gray-700'
                                    }, '✕')
                                ),
                                React.createElement('div', { className: 'flex-1 overflow-auto p-4' },
                                    React.createElement('div', { className: 'flex flex-wrap gap-4' },
                                        mindmapData.map(node =>
                                            React.createElement('div', {
                                                key: node.id,
                                                className: 'p-4 rounded-lg shadow-md text-white',
                                                style: { backgroundColor: node.color, marginLeft: node.parent ? '30px' : '0' }
                                            }, node.label)
                                        )
                                    )
                                )
                            ) :
                            activeDoc ?
                            React.createElement(PDFViewer, { doc: activeDoc }) :
                            React.createElement('div', { className: 'flex items-center justify-center h-full' },
                                React.createElement('div', { className: 'text-center text-gray-400 dark:text-gray-500' },
                                    React.createElement('div', { className: 'text-4xl mb-2' }, '📄'),
                                    React.createElement('p', null, 'No document loaded'),
                                    React.createElement('p', { className: 'text-xs mt-1' }, 'Upload a PDF to get started')
                                )
                            )
                        )
                    ),

                    // Right Sidebar - Chat
                    React.createElement('aside', {
                        className: `w-80 border-l ${theme === 'dark' ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'} flex flex-col`
                    },
                        React.createElement('div', {
                            className: `text-xs font-semibold text-gray-500 dark:text-gray-400 p-2 border-b ${theme === 'dark' ? 'border-gray-700' : 'border-gray-200'} flex justify-between items-center`
                        },
                            React.createElement('span', null, '💬 Research Assistant'),
                            apiStatus === 'valid' ?
                            React.createElement('span', { className: 'text-xs text-green-600' }, '✅ Online') :
                            React.createElement('span', { className: 'text-xs text-yellow-600' }, '⚠️ API Key Required')
                        ),
                        React.createElement('div', { className: 'flex-1 overflow-y-auto p-2 space-y-2' },
                            messages.length === 0 ?
                            React.createElement('div', { className: 'text-gray-400 dark:text-gray-500 text-sm text-center mt-4' },
                                '💬 Ask me anything about your documents!'
                            ) :
                            chatMessages
                        ),
                        React.createElement('div', { className: 'p-2 border-t dark:border-gray-700' },
                            React.createElement('div', { className: 'flex gap-2' },
                                React.createElement('input', {
                                    value: input,
                                    onChange: (e) => setInput(e.target.value),
                                    className: `flex-1 border p-2 rounded text-sm bg-white dark:bg-gray-700 ${apiStatus !== 'valid' ? 'cursor-not-allowed opacity-60' : ''}`,
                                    placeholder: apiStatus === 'valid' ? 'Ask anything...' : 'Set API key first...',
                                    onKeyPress: (e) => e.key === 'Enter' && sendMessage(),
                                    disabled: apiStatus !== 'valid'
                                }),
                                React.createElement('button', {
                                    onClick: sendMessage,
                                    disabled: apiStatus !== 'valid',
                                    className: `p-2 rounded text-white ${apiStatus === 'valid' ? getColorClass('bg') + ' ' + getColorClass('hover') : 'bg-gray-400 cursor-not-allowed'}`
                                }, '➤')
                            ),
                            apiStatus !== 'valid' ?
                            React.createElement('p', { className: 'text-xs text-yellow-600 mt-1' },
                                '⚠️ Please set a valid API key in the header'
                            ) :
                            null
                        )
                    )
                )
            );
        }

        // Render
        try {
            const root = createRoot(document.getElementById('root'));
            root.render(React.createElement(App));
        } catch (error) {
            console.error('Render error:', error);
            document.getElementById('root').innerHTML = `
                    <div style="padding:20px; text-align:center; font-family:system-ui; background:#f9fafb; height:100vh; display:flex; flex-direction:column; justify-content:center;">
                        <div style="font-size:48px; margin-bottom:20px;">⚠️</div>
                        <h2 style="color:#dc2626; margin-bottom:10px;">Something went wrong</h2>
                        <p style="color:#6b7280;">${error.message}</p>
                    </div>
                `;
        }
    </script>
</body>
</html>
