<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyLLM Research Note</title>

  <!-- Tailwind CSS (Play CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' };
  </script>

  <!-- Tell the browser where to resolve bare module specifiers like "react" -->
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react-dom": "https://esm.sh/react-dom@18.3.1?external=react",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client?external=react",
      "lucide-react": "https://esm.sh/lucide-react@0.383.0?external=react"
    }
  }
  </script>
</head>
<body>
  <div id="root"></div>

  <!-- In-browser JSX/Babel compiler (since there's no build step on a static host) -->
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>

  <script type="text/babel" data-type="module" data-presets="react">
import React, { useState, useEffect, useRef, createContext, useContext } from 'react';
import { createRoot } from 'react-dom/client';
import { Plus, Send, FileText, ChevronLeft, ChevronRight, GitBranch, ZoomIn, ZoomOut, Move, X, Key, CheckCircle, AlertCircle, AlertTriangle, Presentation, Settings, BookOpen, Library, Upload, Sun, Moon, Palette } from 'lucide-react';

// ===== THEME CONTEXT =====
const ThemeContext = createContext();

export const useTheme = () => {
  const context = useContext(ThemeContext);
  if (!context) {
    throw new Error('useTheme must be used within a ThemeProvider');
  }
  return context;
};

// ===== THEME PROVIDER =====
const ThemeProvider = ({ children }) => {
  const [theme, setTheme] = useState(() => {
    const saved = localStorage.getItem('app_theme');
    return saved || 'light';
  });
  const [colorScheme, setColorScheme] = useState(() => {
    const saved = localStorage.getItem('app_color_scheme');
    return saved || 'red';
  });

  useEffect(() => {
    localStorage.setItem('app_theme', theme);
    localStorage.setItem('app_color_scheme', colorScheme);
    
    // Apply theme to body
    if (theme === 'dark') {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  }, [theme, colorScheme]);

  const colorSchemes = {
    red: {
      primary: 'bg-red-600',
      primaryHover: 'hover:bg-red-700',
      primaryLight: 'bg-red-50 dark:bg-red-900/20',
      primaryText: 'text-red-600 dark:text-red-400',
      primaryBorder: 'border-red-500',
      primaryDark: 'bg-red-700',
      ring: 'ring-red-600 dark:ring-red-500',
      bg: 'red',
      hex: '#dc2626',
      hexDark: '#ef4444',
    },
    blue: {
      primary: 'bg-blue-600',
      primaryHover: 'hover:bg-blue-700',
      primaryLight: 'bg-blue-50 dark:bg-blue-900/20',
      primaryText: 'text-blue-600 dark:text-blue-400',
      primaryBorder: 'border-blue-500',
      primaryDark: 'bg-blue-700',
      ring: 'ring-blue-600 dark:ring-blue-500',
      bg: 'blue',
      hex: '#2563eb',
      hexDark: '#3b82f6',
    },
    green: {
      primary: 'bg-green-600',
      primaryHover: 'hover:bg-green-700',
      primaryLight: 'bg-green-50 dark:bg-green-900/20',
      primaryText: 'text-green-600 dark:text-green-400',
      primaryBorder: 'border-green-500',
      primaryDark: 'bg-green-700',
      ring: 'ring-green-600 dark:ring-green-500',
      bg: 'green',
      hex: '#16a34a',
      hexDark: '#22c55e',
    },
    purple: {
      primary: 'bg-purple-600',
      primaryHover: 'hover:bg-purple-700',
      primaryLight: 'bg-purple-50 dark:bg-purple-900/20',
      primaryText: 'text-purple-600 dark:text-purple-400',
      primaryBorder: 'border-purple-500',
      primaryDark: 'bg-purple-700',
      ring: 'ring-purple-600 dark:ring-purple-500',
      bg: 'purple',
      hex: '#9333ea',
      hexDark: '#a855f7',
    },
    orange: {
      primary: 'bg-orange-600',
      primaryHover: 'hover:bg-orange-700',
      primaryLight: 'bg-orange-50 dark:bg-orange-900/20',
      primaryText: 'text-orange-600 dark:text-orange-400',
      primaryBorder: 'border-orange-500',
      primaryDark: 'bg-orange-700',
      ring: 'ring-orange-600 dark:ring-orange-500',
      bg: 'orange',
      hex: '#ea580c',
      hexDark: '#f97316',
    },
  };

  const currentColors = colorSchemes[colorScheme] || colorSchemes.red;

  return (
    <ThemeContext.Provider value={{ 
      theme, 
      setTheme, 
      colorScheme, 
      setColorScheme,
      colors: currentColors,
      colorSchemes 
    }}>
      {children}
    </ThemeContext.Provider>
  );
};

// ===== THEME SWITCHER COMPONENT =====
const ThemeSwitcher = () => {
  const { theme, setTheme, colorScheme, setColorScheme, colorSchemes } = useTheme();
  const [showColorPicker, setShowColorPicker] = useState(false);

  const toggleTheme = () => {
    setTheme(theme === 'light' ? 'dark' : 'light');
  };

  const getColorForScheme = (key) => {
    const colors = {
      red: '#dc2626',
      blue: '#2563eb',
      green: '#16a34a',
      purple: '#9333ea',
      orange: '#ea580c'
    };
    return colors[key] || '#dc2626';
  };

  return (
    <div className="flex items-center gap-2">
      <button
        onClick={toggleTheme}
        className="p-2 rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors border border-gray-200 dark:border-gray-600"
        title={theme === 'light' ? 'Switch to Dark Mode' : 'Switch to Light Mode'}
      >
        {theme === 'light' ? (
          <Moon size={18} className="text-gray-700 dark:text-gray-300" />
        ) : (
          <Sun size={18} className="text-yellow-500" />
        )}
      </button>
      
      <div className="relative">
        <button
          onClick={() => setShowColorPicker(!showColorPicker)}
          className="p-2 rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors border border-gray-200 dark:border-gray-600"
          title="Change Color Scheme"
        >
          <Palette size={18} className="text-gray-700 dark:text-gray-300" />
        </button>
        
        {showColorPicker && (
          <>
            <div 
              className="fixed inset-0 z-40"
              onClick={() => setShowColorPicker(false)}
            />
            <div className="absolute right-0 mt-2 p-3 bg-white dark:bg-gray-800 rounded-lg shadow-lg border border-gray-200 dark:border-gray-700 z-50 min-w-[200px]">
              <div className="text-xs font-semibold text-gray-600 dark:text-gray-400 mb-2 px-1">Choose Color Scheme</div>
              <div className="grid grid-cols-5 gap-2">
                {Object.keys(colorSchemes).map((key) => (
                  <button
                    key={key}
                    onClick={() => {
                      setColorScheme(key);
                      setShowColorPicker(false);
                    }}
                    className={`w-10 h-10 rounded-full transition-all transform hover:scale-110 ${
                      colorScheme === key ? 'ring-2 ring-offset-2 ring-gray-400 dark:ring-gray-500 scale-110' : ''
                    }`}
                    style={{
                      backgroundColor: getColorForScheme(key),
                    }}
                    title={key.charAt(0).toUpperCase() + key.slice(1)}
                  />
                ))}
              </div>
              <div className="mt-2 text-center text-xs text-gray-500 dark:text-gray-400">
                Current: <span className="font-semibold capitalize">{colorScheme}</span>
              </div>
            </div>
          </>
        )}
      </div>
    </div>
  );
};

// ===== API KEY MANAGER COMPONENT =====
const ApiKeyManager = ({ apiKey, setApiKey, status, setStatus }) => {
  const { colors } = useTheme();
  const [tempKey, setTempKey] = useState(apiKey);
  const [isEditing, setIsEditing] = useState(false);

  const validateApiKey = (key) => {
    if (!key || key.trim() === '') {
      setStatus('idle');
      return false;
    }
    if (key.trim().length > 10) {
      setStatus('valid');
      return true;
    } else {
      setStatus('invalid');
      return false;
    }
  };

  const handleKeyChange = (e) => {
    const newKey = e.target.value;
    setTempKey(newKey);
    if (newKey.trim() === '') {
      setStatus('idle');
    } else if (newKey.trim().length > 10) {
      setStatus('valid');
    } else {
      setStatus('invalid');
    }
  };

  const handleSaveKey = () => {
    if (validateApiKey(tempKey)) {
      setApiKey(tempKey);
      localStorage.setItem('gemini_api_key', tempKey);
      setIsEditing(false);
    }
  };

  const handleCancel = () => {
    setTempKey(apiKey);
    setIsEditing(false);
    validateApiKey(apiKey);
  };

  const handleRemoveKey = () => {
    setApiKey('');
    setTempKey('');
    setStatus('idle');
    localStorage.removeItem('gemini_api_key');
    setIsEditing(false);
  };

  const getStatusConfig = () => {
    switch(status) {
      case 'valid':
        return {
          color: 'bg-green-500',
          text: 'Connected',
          icon: <CheckCircle size={16} className="text-green-500" />,
          bgColor: 'bg-green-50 dark:bg-green-900/20',
          borderColor: 'border-green-500'
        };
      case 'invalid':
        return {
          color: 'bg-red-500',
          text: 'Invalid Key',
          icon: <AlertCircle size={16} className="text-red-500" />,
          bgColor: 'bg-red-50 dark:bg-red-900/20',
          borderColor: 'border-red-500'
        };
      case 'idle':
      default:
        return {
          color: 'bg-yellow-500',
          text: 'Not Set',
          icon: <AlertTriangle size={16} className="text-yellow-500" />,
          bgColor: 'bg-yellow-50 dark:bg-yellow-900/20',
          borderColor: 'border-yellow-500'
        };
    }
  };

  const statusConfig = getStatusConfig();

  if (!isEditing) {
    return (
      <div className="flex items-center gap-3">
        <div className="flex items-center gap-2">
          <Key size={16} className="text-gray-500 dark:text-gray-400" />
          <span className="text-xs text-gray-500 dark:text-gray-400">API Key:</span>
        </div>
        <div className="flex items-center gap-2">
          <div className={`px-2 py-1 rounded-full text-xs font-semibold flex items-center gap-1 ${statusConfig.bgColor} ${statusConfig.borderColor} border`}>
            {statusConfig.icon}
            <span className={status === 'valid' ? 'text-green-700 dark:text-green-400' : status === 'invalid' ? 'text-red-700 dark:text-red-400' : 'text-yellow-700 dark:text-yellow-400'}>
              {statusConfig.text}
            </span>
          </div>
        </div>
        <button
          onClick={() => {
            setIsEditing(true);
            setTempKey(apiKey);
          }}
          className="text-xs px-2 py-1 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 rounded transition-colors text-gray-700 dark:text-gray-300"
        >
          {apiKey ? 'Change' : 'Set Key'}
        </button>
        {apiKey && (
          <button
            onClick={handleRemoveKey}
            className="text-xs px-2 py-1 text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 rounded transition-colors"
          >
            Remove
          </button>
        )}
      </div>
    );
  }

  return (
    <div className="flex items-center gap-2 bg-gray-50 dark:bg-gray-800 p-2 rounded-lg border border-gray-200 dark:border-gray-700">
      <Key size={16} className="text-gray-500 dark:text-gray-400" />
      <input
        type="password"
        placeholder="Enter your Gemini API key"
        className="border p-1 text-xs rounded w-64 focus:outline-none focus:ring-2 bg-white dark:bg-gray-700 border-gray-300 dark:border-gray-600 text-gray-900 dark:text-gray-100"
        style={{ '--tw-ring-color': colors.hex }}
        value={tempKey}
        onChange={handleKeyChange}
        autoFocus
        onKeyPress={(e) => e.key === 'Enter' && handleSaveKey()}
      />
      <div className="flex items-center gap-1">
        <button
          onClick={handleSaveKey}
          disabled={!tempKey || tempKey.trim().length < 10}
          className={`px-2 py-1 rounded text-xs font-semibold transition-colors ${
            tempKey && tempKey.trim().length >= 10
              ? 'bg-green-600 hover:bg-green-700 text-white'
              : 'bg-gray-300 dark:bg-gray-600 cursor-not-allowed text-gray-500 dark:text-gray-400'
          }`}
        >
          Save
        </button>
        <button
          onClick={handleCancel}
          className="px-2 py-1 rounded text-xs bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors text-gray-700 dark:text-gray-300"
        >
          Cancel
        </button>
      </div>
    </div>
  );
};

// ===== PRESENTATION COMPONENT =====
const PresentationCreator = ({ doc, onClose, apiKey, status }) => {
  const { colors } = useTheme();
  const [numSlides, setNumSlides] = useState(5);
  const [selectedTheme, setSelectedTheme] = useState('modern');
  const [isGenerating, setIsGenerating] = useState(false);
  const [slides, setSlides] = useState([]);
  const [currentSlide, setCurrentSlide] = useState(0);
  const [showSettings, setShowSettings] = useState(true);

  const themes = [
    { id: 'modern', name: 'Modern', colors: ['#1a1a2e', '#16213e', '#0f3460', '#e94560'] },
    { id: 'professional', name: 'Professional', colors: ['#2c3e50', '#34495e', '#3498db', '#ecf0f1'] },
    { id: 'creative', name: 'Creative', colors: ['#6c5ce7', '#a29bfe', '#fd79a8', '#fdcb6e'] },
    { id: 'minimal', name: 'Minimal', colors: ['#ffffff', '#f5f5f5', '#333333', '#666666'] },
    { id: 'corporate', name: 'Corporate', colors: ['#003366', '#0066cc', '#99ccff', '#ffffff'] },
  ];

  const generatePresentation = () => {
    if (!doc || !doc.text) {
      alert('Please upload a document first');
      return;
    }

    setIsGenerating(true);
    setShowSettings(false);

    try {
      const docContent = doc.text.substring(0, 3000);
      const sentences = docContent.split(/[.!?]+/).filter(s => s.trim().length > 20);
      
      const generatedSlides = [];
      
      generatedSlides.push({
        title: doc.name.replace('.pdf', ''),
        content: 'Overview of the document',
        type: 'title'
      });
      
      const slidesNeeded = Math.min(numSlides - 1, Math.ceil(sentences.length / 3));
      const sentencesPerSlide = Math.max(1, Math.ceil(sentences.length / slidesNeeded));
      
      for (let i = 0; i < slidesNeeded && i < numSlides - 1; i++) {
        const start = i * sentencesPerSlide;
        const end = Math.min(start + sentencesPerSlide, sentences.length);
        const slideSentences = sentences.slice(start, end);
        
        if (slideSentences.length > 0) {
          const isBullet = slideSentences.length > 1;
          generatedSlides.push({
            title: `Key Point ${i + 1}`,
            content: isBullet ? '' : slideSentences[0].trim(),
            type: isBullet ? 'bullet' : 'content',
            bulletPoints: isBullet ? slideSentences.map(s => s.trim()) : []
          });
        }
      }
      
      while (generatedSlides.length < numSlides) {
        generatedSlides.push({
          title: `Additional Point ${generatedSlides.length}`,
          content: 'Key insight from the document',
          type: 'content'
        });
      }
      
      setSlides(generatedSlides);
      
    } catch (err) {
      console.error("Presentation generation error:", err);
      setSlides([
        { title: doc.name.replace('.pdf', ''), content: 'Overview of the document', type: 'title' },
        { title: 'Key Findings', content: 'Main insights from the document', type: 'content' },
        { title: 'Important Points', bulletPoints: ['Key point 1', 'Key point 2', 'Key point 3'], type: 'bullet' },
        { title: 'Conclusion', content: 'Summary of the document', type: 'content' },
      ]);
    } finally {
      setIsGenerating(false);
    }
  };

  const renderSlide = (slide, index) => {
    const theme = themes.find(t => t.id === selectedTheme) || themes[0];
    const themeColors = theme.colors;

    if (slide.type === 'title') {
      return (
        <div className="h-full flex flex-col items-center justify-center p-8 text-center">
          <h1 className="text-4xl font-bold mb-4">{slide.title}</h1>
          {slide.content && <p className="text-xl opacity-90">{slide.content}</p>}
        </div>
      );
    } else if (slide.type === 'bullet') {
      return (
        <div className="h-full p-8">
          <h2 className="text-2xl font-bold mb-6">{slide.title}</h2>
          <ul className="space-y-3">
            {slide.bulletPoints?.map((point, i) => (
              <li key={i} className="flex items-start gap-2">
                <span className="text-2xl leading-none">•</span>
                <span className="text-lg">{point}</span>
              </li>
            ))}
          </ul>
        </div>
      );
    } else {
      return (
        <div className="h-full p-8">
          <h2 className="text-2xl font-bold mb-4">{slide.title}</h2>
          <p className="text-lg leading-relaxed">{slide.content}</p>
          {slide.bulletPoints && (
            <ul className="mt-4 space-y-2">
              {slide.bulletPoints.map((point, i) => (
                <li key={i} className="flex items-start gap-2">
                  <span className="text-xl leading-none">•</span>
                  <span>{point}</span>
                </li>
              ))}
            </ul>
          )}
        </div>
      );
    }
  };

  if (isGenerating) {
    return (
      <div className="w-full h-full bg-white dark:bg-gray-800 rounded-lg shadow-xl p-8 flex flex-col items-center justify-center">
        <div className={`animate-spin rounded-full h-16 w-16 border-b-2 ${colors.primary}`}></div>
        <p className="mt-4 text-gray-600 dark:text-gray-400">Generating your presentation...</p>
        <p className="text-sm text-gray-400 dark:text-gray-500 mt-2">This may take a moment</p>
      </div>
    );
  }

  if (slides.length > 0) {
    const theme = themes.find(t => t.id === selectedTheme) || themes[0];
    const themeColors = theme.colors;

    return (
      <div className="w-full h-full bg-white dark:bg-gray-800 rounded-lg shadow-xl overflow-hidden flex flex-col">
        <div className="bg-gray-50 dark:bg-gray-700 p-2 border-b dark:border-gray-600 flex justify-between items-center flex-shrink-0">
          <div className="flex items-center gap-2">
            <button
              onClick={() => setCurrentSlide(Math.max(0, currentSlide - 1))}
              disabled={currentSlide === 0}
              className="p-1 rounded bg-gray-200 dark:bg-gray-600 hover:bg-gray-300 dark:hover:bg-gray-500 disabled:opacity-50 disabled:cursor-not-allowed text-gray-700 dark:text-gray-300"
            >
              <ChevronLeft size={16} />
            </button>
            <span className="text-sm font-medium text-gray-700 dark:text-gray-300">
              Slide {currentSlide + 1} of {slides.length}
            </span>
            <button
              onClick={() => setCurrentSlide(Math.min(slides.length - 1, currentSlide + 1))}
              disabled={currentSlide === slides.length - 1}
              className="p-1 rounded bg-gray-200 dark:bg-gray-600 hover:bg-gray-300 dark:hover:bg-gray-500 disabled:opacity-50 disabled:cursor-not-allowed text-gray-700 dark:text-gray-300"
            >
              <ChevronRight size={16} />
            </button>
          </div>
          <div className="flex items-center gap-2">
            <button
              onClick={() => setShowSettings(!showSettings)}
              className="p-1 rounded bg-gray-200 dark:bg-gray-600 hover:bg-gray-300 dark:hover:bg-gray-500 text-gray-700 dark:text-gray-300"
            >
              <Settings size={16} />
            </button>
            <button
              onClick={onClose}
              className="p-1 rounded bg-gray-200 dark:bg-gray-600 hover:bg-gray-300 dark:hover:bg-gray-500 text-gray-700 dark:text-gray-300"
            >
              <X size={16} />
            </button>
          </div>
        </div>

        {showSettings && (
          <div className="bg-gray-50 dark:bg-gray-700 p-3 border-b dark:border-gray-600 flex-shrink-0">
            <div className="flex items-center gap-4">
              <span className="text-xs font-semibold text-gray-700 dark:text-gray-300">Theme:</span>
              <div className="flex gap-2">
                {themes.map(theme => (
                  <button
                    key={theme.id}
                    onClick={() => setSelectedTheme(theme.id)}
                    className={`px-2 py-1 rounded text-xs transition-colors ${
                      selectedTheme === theme.id
                        ? `${colors.primary} text-white`
                        : 'bg-white dark:bg-gray-600 hover:bg-gray-100 dark:hover:bg-gray-500 text-gray-700 dark:text-gray-300'
                    }`}
                  >
                    {theme.name}
                  </button>
                ))}
              </div>
            </div>
          </div>
        )}

        <div 
          className="flex-1 overflow-auto p-4"
          style={{
            backgroundColor: themeColors[2],
            backgroundImage: `radial-gradient(circle at 20% 50%, ${themeColors[1]}33 0%, transparent 50%)`
          }}
        >
          <div 
            className="max-w-4xl mx-auto h-full rounded-lg shadow-2xl overflow-hidden"
            style={{ backgroundColor: themeColors[0], color: '#ffffff' }}
          >
            {renderSlide(slides[currentSlide], currentSlide)}
          </div>
        </div>

        <div className="bg-white dark:bg-gray-800 border-t dark:border-gray-700 p-2 flex gap-2 overflow-x-auto flex-shrink-0">
          {slides.map((slide, index) => (
            <button
              key={index}
              onClick={() => setCurrentSlide(index)}
              className={`flex-shrink-0 w-20 h-14 rounded border-2 transition-colors ${
                currentSlide === index ? `${colors.primaryBorder}` : 'border-gray-200 dark:border-gray-600'
              }`}
              style={{ backgroundColor: index % 2 === 0 ? themeColors[0] : themeColors[1] }}
            >
              <div className="w-full h-full flex items-center justify-center text-white text-xs opacity-80">
                {index + 1}
              </div>
            </button>
          ))}
        </div>
      </div>
    );
  }

  return (
    <div className="w-full h-full bg-white dark:bg-gray-800 rounded-lg shadow-xl p-8">
      <div className="flex justify-between items-center mb-6">
        <h2 className="text-2xl font-bold text-gray-900 dark:text-gray-100">Create Presentation</h2>
        <button onClick={onClose} className="p-1 hover:bg-gray-100 dark:hover:bg-gray-700 rounded text-gray-700 dark:text-gray-300">
          <X size={20} />
        </button>
      </div>

      <div className="max-w-md mx-auto space-y-6">
        <div>
          <label className="block text-sm font-medium mb-2 text-gray-700 dark:text-gray-300">
            Number of Slides: {numSlides}
          </label>
          <div className="flex items-center gap-4">
            <input
              type="range"
              min="3"
              max="15"
              value={numSlides}
              onChange={(e) => setNumSlides(parseInt(e.target.value))}
              className="flex-1"
            />
            <span className="text-lg font-bold min-w-[40px] text-center text-gray-900 dark:text-gray-100">
              {numSlides}
            </span>
          </div>
        </div>

        <div>
          <label className="block text-sm font-medium mb-2 text-gray-700 dark:text-gray-300">
            Theme
          </label>
          <div className="grid grid-cols-3 gap-2">
            {themes.map(theme => (
              <button
                key={theme.id}
                onClick={() => setSelectedTheme(theme.id)}
                className={`p-3 rounded border-2 transition-colors ${
                  selectedTheme === theme.id

// ===== PDF VIEWER COMPONENT =====
const PDFViewer = ({ doc, page, onPagesLoaded, pdfScale, panX, panY, isDragging, interactMode }) => {
  const { colors } = useTheme();
  const [isLoading, setIsLoading] = useState(true);
  const canvasRef = useRef(null);
  const renderTaskRef = useRef(null);

  const cancelRenderTask = () => {
    if (renderTaskRef.current) {
      try {
        renderTaskRef.current.cancel();
      } catch (e) {}
      renderTaskRef.current = null;
    }
  };

  useEffect(() => {
    let isMounted = true;
    if (!doc || !window.pdfjsLib) return;
    
    const render = async () => {
      try {
        setIsLoading(true);
        cancelRenderTask();
        
        const loadingTask = window.pdfjsLib.getDocument(doc.data);
        const pdf = await loadingTask.promise;
        
        if (isMounted) {
          if (onPagesLoaded) onPagesLoaded(pdf.numPages);
        }
        
        const pdfPage = await pdf.getPage(page);
        const viewport = pdfPage.getViewport({ scale: pdfScale || 1.2 });
        const canvas = canvasRef.current;
        
        if (!canvas) {
          setIsLoading(false);
          return;
        }
        
        const context = canvas.getContext('2d');
        canvas.height = viewport.height;
        canvas.width = viewport.width;
        context.clearRect(0, 0, canvas.width, canvas.width);
        
        const renderTask = pdfPage.render({ 
          canvasContext: context, 
          viewport: viewport 
        });
        
        renderTaskRef.current = renderTask;
        await renderTask.promise;
        
        if (isMounted) {
          setIsLoading(false);
          renderTaskRef.current = null;
        }
      } catch (err) {
        if (err.name !== 'RenderingCancelledException') {
          console.error("PDF Render Error:", err);
        }
        if (isMounted) {
          setIsLoading(false);
        }
      }
    };
    
    render();
    
    return () => {
      isMounted = false;
      cancelRenderTask();
    };
  }, [doc, page, pdfScale, onPagesLoaded]);
  
  return (
    <div 
      className="relative w-full h-full flex items-center justify-center"
      style={{
        transform: `translate(${panX || 0}px, ${panY || 0}px)`,
        transition: isDragging ? 'none' : 'transform 0.1s ease'
      }}
    >
      {isLoading && (
        <div className="absolute inset-0 flex items-center justify-center bg-gray-100 dark:bg-gray-800 bg-opacity-75 dark:bg-opacity-75 z-10">
          <div className={`animate-spin rounded-full h-12 w-12 border-b-2 ${colors.primary}`}></div>
        </div>
      )}
      <canvas 
        ref={canvasRef} 
        className={`shadow-2xl bg-white ${interactMode ? 'cursor-move' : ''}`}
        style={{
          maxWidth: '100%',
          height: 'auto',
        }}
      />
    </div>
  );
};

const MindmapViewer = ({ data, onClose }) => {
  const { colors } = useTheme();
  const containerRef = useRef(null);
  const [zoomLevel, setZoomLevel] = useState(1);
  const [panPosition, setPanPosition] = useState({ x: 0, y: 0 });
  const [isDragging, setIsDragging] = useState(false);
  const [dragStart, setDragStart] = useState({ x: 0, y: 0 });

  if (!data || data.length === 0) {
    return (
      <div className="w-full h-full bg-white dark:bg-gray-800 rounded-lg shadow-xl flex flex-col items-center justify-center p-8">
        <div className="text-gray-400 dark:text-gray-500 text-center">
          <GitBranch size={48} className="mx-auto mb-4 opacity-30" />
          <p>No mindmap data available</p>
          <p className="text-sm mt-2">Try generating a mindmap again</p>
        </div>
        <button 
          onClick={onClose}
          className="mt-4 px-4 py-2 bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 rounded transition-colors text-gray-700 dark:text-gray-300"
        >
          Close
        </button>
      </div>
    );
  }

  const buildTree = (items, parentId = null) => {
    return items
      .filter(item => item.parent === parentId)
      .map(item => ({
        ...item,
        children: buildTree(items, item.id)
      }));
  };

  const treeData = buildTree(data);
  
  const calculateTreeDimensions = (nodes, level = 0) => {
    if (!nodes || nodes.length === 0) return { width: 0, height: 0 };
    
    let maxWidth = 0;
    let maxHeight = 0;
    const nodeSpacing = 140;
    const levelHeight = 160;
    
    nodes.forEach((node, index) => {
      const children = node.children || [];
      if (children.length > 0) {
        const childDim = calculateTreeDimensions(children, level + 1);
        maxWidth = Math.max(maxWidth, childDim.width);
        maxHeight = Math.max(maxHeight, childDim.height + levelHeight);
      } else {
        maxWidth = Math.max(maxWidth, (index + 1) * nodeSpacing + 100);
        maxHeight = Math.max(maxHeight, levelHeight + 50);
      }
    });
    
    return { width: maxWidth + nodeSpacing, height: maxHeight + 50 };
  };

  const dimensions = calculateTreeDimensions(treeData);
  const totalWidth = Math.max(dimensions.width, 1200);
  const totalHeight = Math.max(dimensions.height, 600);

  const renderTree = (node, x, y, level = 0) => {
    const children = node.children || [];
    const isRoot = node.parent === null;
    const nodeSize = isRoot ? 120 : 90;
    const nodeSpacing = 140;
    const levelHeight = 160;
    
    const childrenWidth = children.length > 0 ? (children.length - 1) * nodeSpacing : 0;
    const startX = x - (childrenWidth / 2);
    
    // Use the color scheme's hex color for root
    const rootColor = isRoot ? colors.hex : (node.color || '#4A90E2');
    
    return (
      <div key={node.id}>
        <div 
          className="absolute flex items-center justify-center rounded-full shadow-lg transition-all duration-200 hover:scale-110 z-10"
          style={{
            width: nodeSize,
            height: nodeSize,
            left: x - nodeSize/2,
            top: y - nodeSize/2,
            backgroundColor: rootColor,
            color: 'white',
            fontWeight: isRoot ? 'bold' : 'normal',
            fontSize: isRoot ? '14px' : '12px',
            padding: '8px',
            textAlign: 'center',
            cursor: 'pointer',
            border: '3px solid white',
            boxShadow: '0 4px 6px rgba(0,0,0,0.1)'
          }}
        >
          <span className="line-clamp-2 px-2">{node.label}</span>
        </div>
        
        {children.length > 0 && (
          <>
            <div 
              style={{
                position: 'absolute',
                left: x - 1,
                top: y + (nodeSize/2),
                width: '2px',
                height: 30,
                backgroundColor: '#999',
                zIndex: 0
              }}
            />
            
            <div 
              style={{
                position: 'absolute',
                left: startX + (nodeSpacing/2),
                top: y + (nodeSize/2) + 30,
                width: childrenWidth,
                height: '2px',
                backgroundColor: '#999',
                zIndex: 0
              }}
            />
            
            {children.map((child, index) => {
              const childX = startX + (index * nodeSpacing) + (nodeSpacing/2);
              const childY = y + levelHeight;
              
              return (
                <React.Fragment key={child.id}>
                  <div 
                    style={{
                      position: 'absolute',
                      left: childX - 1,
                      top: y + (nodeSize/2) + 30,
                      width: '2px',
                      height: (childY - y - (nodeSize/2) - 30),
                      backgroundColor: '#999',
                      zIndex: 0
                    }}
                  />
                  {renderTree(child, childX, childY, level + 1)}
                </React.Fragment>
              );
            })}
          </>
        )}
      </div>
    );
  };

  const handleWheel = (e) => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? -0.1 : 0.1;
    setZoomLevel(prev => Math.max(0.5, Math.min(2, prev + delta)));
  };

  const handleMouseDown = (e) => {
    setIsDragging(true);
    setDragStart({ x: e.clientX - panPosition.x, y: e.clientY - panPosition.y });
  };

  const handleMouseMove = (e) => {
    if (!isDragging) return;
    setPanPosition({
      x: e.clientX - dragStart.x,
      y: e.clientY - dragStart.y
    });
  };

  const handleMouseUp = () => {
    setIsDragging(false);
  };

  const resetView = () => {
    setZoomLevel(1);
    setPanPosition({ x: 0, y: 0 });
  };

  const centerX = Math.max((totalWidth / 2) - 100, 200);
  const startY = 60;

  return (
    <div className="w-full h-full bg-white dark:bg-gray-800 rounded-lg shadow-xl overflow-hidden flex flex-col">
      <div className="flex justify-between items-center p-3 border-b bg-gray-50 dark:bg-gray-700 flex-shrink-0">
        <h3 className="font-bold text-lg flex items-center gap-2 text-gray-900 dark:text-gray-100">
          <GitBranch size={20} className={colors.primaryText} />
          Mindmap
        </h3>
        <div className="flex items-center gap-2">
          <button
            onClick={resetView}
            className="px-2 py-1 text-xs bg-gray-200 dark:bg-gray-600 hover:bg-gray-300 dark:hover:bg-gray-500 rounded transition-colors text-gray-700 dark:text-gray-300"
          >
            Reset View
          </button>
          <span className="text-xs text-gray-500 dark:text-gray-400">{Math.round(zoomLevel * 100)}%</span>
          <button 
            onClick={onClose}
            className="p-1 hover:bg-gray-200 dark:hover:bg-gray-600 rounded-full transition-colors text-gray-700 dark:text-gray-300"
          >
            <X size={20} />
          </button>
        </div>
      </div>
      
      <div 
        ref={containerRef}
        className="flex-1 overflow-auto relative bg-gray-50 dark:bg-gray-900"
        onWheel={handleWheel}
        onMouseDown={handleMouseDown}
        onMouseMove={handleMouseMove}
        onMouseUp={handleMouseUp}
        onMouseLeave={handleMouseUp}
        style={{ cursor: isDragging ? 'grabbing' : 'grab' }}
      >
        <div 
          className="relative"
          style={{
            width: totalWidth * zoomLevel,
            height: totalHeight * zoomLevel,
            transform: `translate(${panPosition.x}px, ${panPosition.y}px)`,
            transformOrigin: '0 0',
            transition: isDragging ? 'none' : 'transform 0.1s ease'
          }}
        >
          {treeData.map((node, index) => {
            const nodeSpacing = 140;
            const totalWidth = (treeData.length - 1) * nodeSpacing;
            const startX = Math.max(totalWidth / 2, 200);
            return renderTree(
              node, 
              (startX + (index * nodeSpacing)) * zoomLevel, 
              startY * zoomLevel
            );
          })}
        </div>
      </div>
      
      <div className="p-2 border-t bg-gray-50 dark:bg-gray-700 flex-shrink-0 text-xs text-gray-500 dark:text-gray-400 text-center">
        💡 Scroll to zoom • Drag to pan • Hover nodes for details
      </div>
    </div>
  );
};

const FormattedText = ({ text }) => {
  if (!text) return null;

  return (
    <div>
      {text.split('\n').map((line, i) => {
        if (!line.trim()) return <div key={i} className="h-2" />;

        if (line.includes('###')) {
          const parts = line.split('###');
          return (
            <div key={i} className="mb-2">
              {parts.map((part, j) => {
                if (j === 0 && part.trim() === '') return null;
                return (
                  <span key={j}>
                    {j > 0 && <br />}
                    <h3 className="font-bold text-gray-800 dark:text-gray-200 text-sm inline">{part}</h3>
                  </span>
                );
              })}
            </div>
          );
        }

        const parts = line.split(/(\*\*.*?\*\*)/g);
        return (
          <p key={i} className="mb-1">
            {parts.map((part, j) => {
              if (part.startsWith('**') && part.endsWith('**')) {
                return <strong key={j} className="font-semibold text-gray-900 dark:text-gray-100">{part.slice(2, -2)}</strong>;
              }
              return part;
            })}
          </p>
        );
      })}
    </div>
  );
};

function AppContent() {

  const [status, setStatus] = useState('idle'); 
  const [documents, setDocuments] = useState([]);
  const [activeDocId, setActiveDocId] = useState(null);
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [isGenerating, setIsGenerating] = useState(false);
  const [currentPage, setCurrentPage] = useState(1);
  const [numPages, setNumPages] = useState(0);
  const [pdfLibLoaded, setPdfLibLoaded] = useState(false);
  const [showMindmap, setShowMindmap] = useState(false);
  const [mindmapData, setMindmapData] = useState(null);
  const [isGeneratingMindmap, setIsGeneratingMindmap] = useState(false);
  const [showPresentation, setShowPresentation] = useState(false);
  
  const [pdfScale, setPdfScale] = useState(1.2);
  const [panX, setPanX] = useState(0);
  const [panY, setPanY] = useState(0);
  const [isDragging, setIsDragging] = useState(false);
  const [dragStartX, setDragStartX] = useState(0);
  const [dragStartY, setDragStartY] = useState(0);
  const [interactMode, setInteractMode] = useState(false);
  
  const viewerRef = useRef(null);

  useEffect(() => {
    if (apiKey && apiKey.trim().length > 10) {
      setStatus('valid');
    } else if (apiKey && apiKey.trim().length > 0) {
      setStatus('invalid');
    } else {
      setStatus('idle');
    }
  }, [apiKey]);

  useEffect(() => {
    if (!window.pdfjsLib) {
      const script = document.createElement('script');
      script.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
      script.onload = () => {
        window.pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
        setPdfLibLoaded(true);
      };
      document.body.appendChild(script);
    } else {
      setPdfLibLoaded(true);
    }
  }, []);

  const extractTextFromPDF = async (pdfData) => {
    try {
      if (!window.pdfjsLib) return { fullText: '', pageTexts: [] };
      const loadingTask = window.pdfjsLib.getDocument(pdfData);
      const pdf = await loadingTask.promise;
      let fullText = '';
      let pageTexts = [];
      
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const textContent = await page.getTextContent();
        const pageText = textContent.items.map(item => item.str).join(' ');
        pageTexts.push({ page: i, text: pageText });
        fullText += pageText + '\n';
      }
      
      return { fullText, pageTexts };
    } catch (err) {
      console.error("Text extraction error:", err);
      return { fullText: '', pageTexts: [] };
    }
  };

  const sendMessage = async () => {
    if (!input.trim() || status !== 'valid') {
      alert('Please set a valid API key first');
      return;
    }
    
    const userMsg = { role: 'user', text: input };
    setMessages(prev => [...prev, userMsg]);
    const currentInput = input;
    setInput('');
    setIsGenerating(true);

    try {
      const activeDoc = documents.find(d => d.id === activeDocId);
      
      let isDocumentQuery = false;
      let contextPrompt = '';
      
      if (activeDoc && activeDoc.text && activeDoc.text.length > 0) {
        const questionLower = currentInput.toLowerCase();
        const docKeywords = ['document', 'pdf', 'file', 'this', 'according to', 'based on', 'in the', 'from the'];
        const hasDocKeywords = docKeywords.some(keyword => questionLower.includes(keyword));
        
        const questionWords = questionLower.split(' ').filter(w => w.length > 3);
        const docLower = activeDoc.text.toLowerCase();
        const hasDocContent = questionWords.some(word => docLower.includes(word));
        
        if (hasDocKeywords || hasDocContent) {
          isDocumentQuery = true;
          const pageContext = activeDoc.pageTexts || [];
          
          const pageContextStr = pageContext.map(p => 
            `Page ${p.page}: ${p.text.substring(0, 1500)}`
          ).join('\n\n').substring(0, 15000);
          
          contextPrompt = `You are analyzing the document "${activeDoc.name}". 
Answer the following question based ONLY on the document content provided below.

Document content with page numbers:
${pageContextStr}

Question: ${currentInput}

Instructions:
1. If the answer is in the document, provide the answer and cite the specific page number(s).
2. Format your response with clear references like "On page X..." or "[Page X]".
3. If the answer is not in the document, say "I couldn't find this information in the document."
4. Be specific and use exact information from the document.

Answer:`;
        }
      }
      
      if (!isDocumentQuery) {
        contextPrompt = `You are a helpful AI assistant. Answer the following general knowledge question accurately and concisely.
        
Question: ${currentInput}

Provide a clear, informative answer. If you're unsure, say so.

Answer:`;
      }

      const requestBody = {
        contents: [
          {
            parts: [
              {
                text: contextPrompt
              }
            ]
          }
        ],
        generationConfig: {
          temperature: 0.3,
          maxOutputTokens: 2048
        }
      };

      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${apiKey}`, {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(requestBody)
      });

      if (!response.ok) {
        const errorText = await response.text();
        let errorMessage = response.statusText;
        try {
          const errorData = JSON.parse(errorText);
          errorMessage = errorData.error?.message || errorMessage;
        } catch (e) {
          errorMessage = errorText || errorMessage;
        }
        throw new Error(`API Error (${response.status}): ${errorMessage}`);
      }

      const data = await response.json();
      
      const botText = data.candidates?.[0]?.content?.parts?.[0]?.text || "I couldn't generate a response. Please try again.";
      
      const references = [];
      if (isDocumentQuery && activeDoc && activeDoc.pageTexts) {
        const pageMatches = botText.match(/\[Page (\d+)\]/g) || botText.match(/page (\d+)/gi);
        if (pageMatches) {
          const pageNumbers = pageMatches.map(m => {
            const num = parseInt(m.match(/\d+/)?.[0]);
            return num;
          }).filter(num => !isNaN(num));
          
          const uniquePages = [...new Set(pageNumbers)];
          
          uniquePages.forEach(pageNum => {
            const pageContent = activeDoc.pageTexts.find(p => p.page === pageNum);
            if (pageContent) {
              const textSnippet = pageContent.text.substring(0, 150) + '...';
              references.push({
                page: pageNum,
                text: textSnippet
              });
            }
          });
        }
      }
      
      setMessages(prev => [...prev, { 
        role: 'bot', 
        text: botText,
        references: references,
        isDocumentQuery: isDocumentQuery
      }]);
    } catch (err) {
      console.error("Error sending message:", err);
      setMessages(prev => [...prev, { 
        role: 'bot', 
        text: `❌ Error: ${err.message || "Failed to get response. Please check your API key and try again."}` 
      }]);
    } finally {
      setIsGenerating(false);
    }
  };

  const generateMindmap = () => {
    const activeDoc = documents.find(d => d.id === activeDocId);
    if (!activeDoc || !activeDoc.text) {
      alert('Please upload a document first');
      return;
    }

    if (status !== 'valid') {
      alert('Please set a valid API key first');
      return;
    }

    setIsGeneratingMindmap(true);
    setShowMindmap(true);

    try {
      const docContent = activeDoc.text.substring(0, 2000);
      const sentences = docContent.split(/[.!?]+/).filter(s => s.trim().length > 10);
      
      const mindmapNodes = [];
      
      mindmapNodes.push({
        id: 'root',
        label: activeDoc.name.replace('.pdf', '').substring(0, 30),
        parent: null,
        color: colors.hex
      });
      
      const mainTopics = [];
      const topicCount = Math.min(4, Math.ceil(sentences.length / 3));
      
      for (let i = 0; i < topicCount && i < sentences.length; i++) {
        const topicId = `t${i + 1}`;
        const label = sentences[i].trim().substring(0, 25);
        mainTopics.push(topicId);
        mindmapNodes.push({
          id: topicId,
          label: label || `Topic ${i + 1}`,
          parent: 'root',
          color: ['#4CAF50', '#2196F3', '#FF9800', '#9C27B0'][i % 4]
        });
      }
      
      const subTopicColors = ['#8BC34A', '#64B5F6', '#FFB74D', '#CE93D8'];
      mainTopics.forEach((topicId, index) => {
        const startIdx = (index + 1) * 2;
        const endIdx = Math.min(startIdx + 2, sentences.length);
        
        for (let i = startIdx; i < endIdx && i < sentences.length; i++) {
          const subId = `${topicId}-${i}`;
          mindmapNodes.push({
            id: subId,
            label: sentences[i].trim().substring(0, 20) || `Sub-topic ${i}`,
            parent: topicId,
            color: subTopicColors[index % subTopicColors.length]
          });
        }
      });
      
      setMindmapData(mindmapNodes);
    } catch (err) {
      console.error("Mindmap generation error:", err);
      setMindmapData([
        { id: 'root', label: activeDoc.name.replace('.pdf', '').substring(0, 30), parent: null, color: colors.hex },
        { id: '1', label: 'Key Concept 1', parent: 'root', color: '#4CAF50' },
        { id: '2', label: 'Key Concept 2', parent: 'root', color: '#2196F3' },
        { id: '3', label: 'Key Concept 3', parent: 'root', color: '#FF9800' },
        { id: '1-1', label: 'Sub-concept A', parent: '1', color: '#8BC34A' },
        { id: '1-2', label: 'Sub-concept B', parent: '1', color: '#8BC34A' },
        { id: '2-1', label: 'Sub-concept C', parent: '2', color: '#64B5F6' },
        { id: '3-1', label: 'Sub-concept D', parent: '3', color: '#FFB74D' },
      ]);
    } finally {
      setIsGeneratingMindmap(false);
    }
  };

  const handleUploadDocument = async (e) => {
    const files = e.target.files;
    if (!files || files.length === 0) return;
    
    for (const file of files) {
      const reader = new FileReader();
      reader.onload = async (ev) => {
        const pdfData = ev.target.result;
        const newDoc = { 
          id: crypto.randomUUID(), 
          name: file.name, 
          data: pdfData,
          text: '',
          pageTexts: []
        };
        
        const extracted = await extractTextFromPDF(pdfData);
        newDoc.text = extracted.fullText;
        newDoc.pageTexts = extracted.pageTexts;
        
        setDocuments(prev => [...prev, newDoc]);
        if (!activeDocId) {
          setActiveDocId(newDoc.id);
          setCurrentPage(1);
          setPanX(0);
          setPanY(0);
          setPdfScale(1.2);
        }
        
        if (documents.length === 0) {
          setMessages(prev => [...prev, { 
            role: 'bot', 
            text: `📄 **Document "${file.name}" uploaded successfully!**\n\nI can now answer questions about this document. Ask me anything about the content, and I'll provide page references.\n\nYou can also ask me general knowledge questions, and I'll answer those as well.` 
          }]);
        }
      };
      reader.readAsDataURL(file);
    }
    e.target.value = '';
  };

  const handleDeleteDocument = (docId) => {
    setDocuments(prev => prev.filter(d => d.id !== docId));
    if (activeDocId === docId) {
      setActiveDocId(documents.length > 1 ? documents.find(d => d.id !== docId)?.id || null : null);
      setNumPages(0);
    }
  };

  const handleSelectDocument = (docId) => {
    setActiveDocId(docId);
    setCurrentPage(1);
    setShowMindmap(false);
    setShowPresentation(false);
    setPanX(0);
    setPanY(0);
    setPdfScale(1.2);
  };

  const handleMouseDown = (e) => {
    if (!interactMode) return;
    setIsDragging(true);
    setDragStartX(e.clientX - panX);
    setDragStartY(e.clientY - panY);
  };

  const handleMouseMove = (e) => {
    if (!isDragging || !interactMode) return;
    setPanX(e.clientX - dragStartX);
    setPanY(e.clientY - dragStartY);
  };

  const handleMouseUp = () => {
    setIsDragging(false);
  };

  const handleZoomIn = () => {
    setPdfScale(prev => Math.min(prev + 0.2, 4));
  };

  const handleZoomOut = () => {
    setPdfScale(prev => Math.max(prev - 0.2, 0.5));
  };

  const handleResetView = () => {
    setPdfScale(1.2);
    setPanX(0);
    setPanY(0);
  };

  const toggleInteractMode = () => {
    setInteractMode(!interactMode);
    if (!interactMode) {
      setPanX(0);
      setPanY(0);
    }
  };

  const activeDoc = documents.find(d => d.id === activeDocId);

  return (
    <div className={`min-h-screen transition-colors duration-200 ${
      theme === 'dark' 
        ? 'bg-gray-900 text-gray-100' 
        : 'bg-gray-50 text-gray-900'
    } font-sans flex flex-col`}>
      <header className={`border-b transition-colors duration-200 p-3 shadow-sm flex justify-between items-center flex-shrink-0 ${
        theme === 'dark'
          ? 'bg-gray-800 border-gray-700'
          : 'bg-white border-gray-200'
      }`}>
        <h1 className={`font-serif text-xl font-bold ${colors.primaryText}`}>MyLLM Research Note</h1>
        <div className="flex items-center gap-3">
          <ThemeSwitcher />
          <ApiKeyManager 
            apiKey={apiKey}
            setApiKey={setApiKey}
            status={status}
            setStatus={setStatus}
          />
        </div>
      </header>

      <div className="flex flex-1 overflow-hidden">
        <aside className={`w-64 border-r transition-colors duration-200 flex-shrink-0 overflow-hidden ${
          theme === 'dark'
            ? 'bg-gray-900 border-gray-700'
            : 'bg-gray-50 border-gray-200'
        }`}>
          <DocumentList 
            documents={documents}
            activeDocId={activeDocId}
            onSelectDocument={handleSelectDocument}
            onUploadDocument={handleUploadDocument}
            onDeleteDocument={handleDeleteDocument}
          />
        </aside>

        <main className={`flex-1 flex flex-col overflow-hidden transition-colors duration-200 ${
          theme === 'dark' ? 'bg-gray-800' : 'bg-gray-200'
        }`}>
          <div className={`p-2 border-b transition-colors duration-200 flex justify-between items-center flex-shrink-0 ${
            theme === 'dark'
              ? 'bg-gray-800 border-gray-700'
              : 'bg-white border-gray-200'
          }`}>
            <span className={`text-xs font-semibold uppercase tracking-wider ${
              theme === 'dark' ? 'text-gray-400' : 'text-gray-500'
            }`}>
              {activeDoc ? activeDoc.name : 'Document Viewer'}
            </span>
            {activeDoc && (
              <div className="flex items-center gap-2 flex-wrap">
                <button 
                  onClick={toggleInteractMode}
                  className={`p-1 rounded transition-colors ${interactMode ? 'bg-blue-500 text-white' : theme === 'dark' ? 'bg-gray-700 hover:bg-gray-600 text-gray-300' : 'bg-gray-200 hover:bg-gray-300 text-gray-700'}`}
                  title="Toggle Interact Mode (Pan/Zoom)"
                >
                  <Move size={16} />
                </button>
                <button onClick={handleZoomIn} className={`p-1 rounded transition-colors ${
                  theme === 'dark'
                    ? 'bg-gray-700 hover:bg-gray-600 text-gray-300'
                    : 'bg-gray-200 hover:bg-gray-300 text-gray-700'
                }`}>
                  <ZoomIn size={16} />
                </button>
                <button onClick={handleZoomOut} className={`p-1 rounded transition-colors ${
                  theme === 'dark'
                    ? 'bg-gray-700 hover:bg-gray-600 text-gray-300'
                    : 'bg-gray-200 hover:bg-gray-300 text-gray-700'
                }`}>
                  <ZoomOut size={16} />
                </button>
                <button onClick={handleResetView} className={`p-1 rounded transition-colors text-xs px-2 ${
                  theme === 'dark'
                    ? 'bg-gray-700 hover:bg-gray-600 text-gray-300'
                    : 'bg-gray-200 hover:bg-gray-300 text-gray-700'
                }`}>
                  Reset
                </button>
                <span className={`text-xs w-10 ${theme === 'dark' ? 'text-gray-300' : 'text-gray-700'}`}>
                  {(pdfScale * 100).toFixed(0)}%
                </span>
                <button 
                  onClick={() => setCurrentPage(p => Math.max(1, p - 1))} 
                  className={`p-1 rounded transition-colors ${
                    theme === 'dark'
                      ? 'bg-gray-700 hover:bg-gray-600 text-gray-300'
                      : 'bg-gray-200 hover:bg-gray-300 text-gray-700'
                  }`}
                >
                  <ChevronLeft size={16}/>
                </button>
                <span className={`text-xs ${theme === 'dark' ? 'text-gray-300' : 'text-gray-700'}`}>
                  {currentPage} / {numPages || '?'}
                </span>
                <button 
                  onClick={() => setCurrentPage(p => Math.min(numPages || 1, p + 1))} 
                  className={`p-1 rounded transition-colors ${
                    theme === 'dark'
                      ? 'bg-gray-700 hover:bg-gray-600 text-gray-300'
                      : 'bg-gray-200 hover:bg-gray-300 text-gray-700'
                  }`}
                >
                  <ChevronRight size={16}/>
                </button>
              </div>
            )}
          </div>

          {activeDoc && (
            <div className={`p-2 border-b transition-colors duration-200 flex items-center gap-2 flex-shrink-0 ${
              theme === 'dark'
                ? 'bg-gray-800 border-gray-700'
                : 'bg-white border-gray-200'
            }`}>
              <button 
                onClick={() => setShowPresentation(true)}
                className="px-4 py-1.5 rounded text-white text-sm font-semibold flex items-center gap-2 bg-purple-600 hover:bg-purple-700 transition-colors shadow-sm"
              >
                <Presentation size={16} />
                Create Presentation
              </button>
              
              <button 
                onClick={generateMindmap}
                disabled={isGeneratingMindmap || status !== 'valid'}
                className={`px-4 py-1.5 rounded text-white text-sm font-semibold flex items-center gap-2 transition-colors shadow-sm ${
                  isGeneratingMindmap || status !== 'valid'
                    ? 'bg-gray-400 dark:bg-gray-600 cursor-not-allowed' 
                    : `${colors.primary} ${colors.primaryHover}`
                }`}
                title={status !== 'valid' ? 'Please set a valid API key first' : ''}
              >
                <GitBranch size={16} />
                {isGeneratingMindmap ? 'Generating...' : 'Create Mindmap'}
              </button>
            </div>
          )}

          <div 
            ref={viewerRef}
            className="flex-1 overflow-auto relative"
            onMouseDown={handleMouseDown}
            onMouseMove={handleMouseMove}
            onMouseUp={handleMouseUp}
            onMouseLeave={handleMouseUp}
          >
            <div className="p-4 min-h-full flex items-center justify-center">
              {showPresentation && activeDoc ? (
                <PresentationCreator 
                  doc={activeDoc}
                  onClose={() => setShowPresentation(false)}
                  apiKey={apiKey}
                  status={status}
                />
              ) : showMindmap && mindmapData ? (
                <MindmapViewer 
                  data={mindmapData} 
                  onClose={() => setShowMindmap(false)}
                />
              ) : (
                activeDoc ? (
                  <PDFViewer 
                    doc={activeDoc}
                    page={currentPage}
                    onPagesLoaded={setNumPages}
                    pdfScale={pdfScale}
                    panX={panX}
                    panY={panY}
                    isDragging={isDragging}
                    interactMode={interactMode}
                  />
                ) : (
                  <div className={`italic text-center ${theme === 'dark' ? 'text-gray-500' : 'text-gray-400'}`}>
                    <FileText size={48} className="mx-auto mb-2 opacity-50" />
                    <p>No document loaded</p>
                    <p className="text-xs mt-1">Upload a PDF to get started</p>
                  </div>
                )
              )}
            </div>
          </div>
        </main>

        <aside className={`w-80 border-l transition-colors duration-200 flex-shrink-0 overflow-hidden ${
          theme === 'dark'
            ? 'bg-gray-800 border-gray-700'
            : 'bg-white border-gray-200'
        }`}>
          <ChatInterface 
            messages={messages}
            input={input}
            setInput={setInput}
            sendMessage={sendMessage}
            isGenerating={isGenerating}
            status={status}
          />
        </aside>
      </div>
    </div>
  );
}

// ===== MAIN APP WITH THEME PROVIDER =====
export default function App() {
  return (
    <ThemeProvider>
      <AppContent />
    </ThemeProvider>
  );
}

// ===== MOUNT APP =====
const root = createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
